name: Fetch and Release teleMirror

on:
  workflow_dispatch:

permissions:
  contents: write   # برای ساخت Release

jobs:
  release-asset:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get latest teleMirror release info
        id: info
        run: |
          response=$(curl -sL \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/ircfspace/teleMirror/releases/latest)

          tag=$(echo "$response" | jq -r .tag_name)
          asset_url=$(echo "$response" | jq -r '.assets[] | select(.name == "tele-mirror-win-arm64.zip") | .url')

          echo "tag=$tag" >> $GITHUB_OUTPUT
          echo "asset_url=$asset_url" >> $GITHUB_OUTPUT

      - name: Download asset
        run: |
          curl -L \
            -H "Accept: application/octet-stream" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -o tele-mirror-win-arm64.zip \
            "${{ steps.info.outputs.asset_url }}"

      - name: Create Release and upload
        run: |
          gh release create "${{ steps.info.outputs.tag }}" \
            --repo "${{ github.repository }}" \
            --title "teleMirror ${{ steps.info.outputs.tag }}" \
            --notes "Downloaded from ircfspace/teleMirror release" \
            tele-mirror-win-arm64.zip
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

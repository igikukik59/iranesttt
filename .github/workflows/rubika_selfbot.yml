name: Connect to Rubika via Session

on:
  workflow_dispatch:

jobs:
  connect:
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install rubpy python-dotenv

      - name: 🔐 Decode session from secret
        env:
          SESSION_B64: ${{ secrets.RUBIKA_SESSION }}
        run: |
          # مینویسه توی rubika_session.session (همان فرمت SQLite)
          echo "$SESSION_B64" | base64 -d > rubika_session.session
          echo "✅ Session file restored."

      - name: 🚀 Connect to Rubika
        run: |
          python << 'PYEOF'
          import asyncio, sys
          from rubpy import Client

          if sys.platform == "win32":
              asyncio.set_event_loop_policy(asyncio.WindowsSelectorEventLoopPolicy())

          client = Client(name='rubika_session')   # rubika_session.session رو می‌خونه
          try:
              client.start()
              print('✅ Connected to Rubika successfully!')
              client.send_message('me', '✅ GitHub Actions connected successfully!')
              print('📤 Test message sent to Saved Messages.')
          finally:
              client.disconnect()
              print('🔌 Disconnected.')
          PYEOF

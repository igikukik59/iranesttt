name: 📦 Upload 100MB + live speed

on:
  workflow_dispatch:

jobs:
  upload-huge:
    runs-on: ubuntu-latest
    env:
      SESSION_B64: ${{ secrets.RUBIKA_SESSION }}
      SESSION_NAME: rubika_session
      SESSION_FILE: rubika_session.rp

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install rubpy==7.3.5
      - run: echo "$SESSION_B64" | base64 -d > $SESSION_FILE
      - run: ls -la $SESSION_FILE

      - name: 🚀 Create 100MB file & upload with live progress
        run: |
          python << 'PYEOF'
          import asyncio, os, time, sys
          from pathlib import Path
          from rubpy import Client

          async def main():
              # ۱. ساخت فایل ۱۰۰ مگابایتی
              file_path = Path("huge_100mb.bin")
              target_size = 100 * 1024 * 1024
              print(f"📄 Creating random file of size {target_size} bytes...")
              with open(file_path, "wb") as f:
                  f.write(os.urandom(target_size))
              size_mb = file_path.stat().st_size / (1024 * 1024)
              print(f"📁 File created: {file_path} ({size_mb:.2f} MB)")

              # ۲. متغیرهای پیشرفت و زمان
              last_update = [0]
              last_bytes = [0]
              start_time = time.time()

              # ۳. تابع callback برای نمایش پیشرفت
              def progress_callback(current: int, total: int):
                  now = time.time()
                  elapsed = now - start_time
                  # سرعت لحظه‌ای (بر اساس کلی)
                  instant_speed = current / elapsed if elapsed > 0 else 0
                  percent = (current / total) * 100
                  # نمایش در هر ۱٪ تغییر (یا حداقل هر ۲۵۰ میلی‌ثانیه)
                  if percent - last_update[0] >= 1 or (now - getattr(progress_callback, "_last_print", 0) > 0.25):
                      sys.stdout.write(
                          f"\r⏳ Upload: {percent:.1f}% | "
                          f"{current/(1024*1024):.1f}/{total/(1024*1024):.1f} MB | "
                          f"🚀 {instant_speed/(1024*1024):.2f} MB/s   "
                      )
                      sys.stdout.flush()
                      last_update[0] = percent
                      progress_callback._last_print = now

              progress_callback._last_print = 0

              # ۴. اتصال و آپلود با callback
              try:
                  async with Client(name=os.environ["SESSION_NAME"]) as app:
                      print("⏳ Starting upload (100 MB)...")
                      # upload returns a file_id that we can then use to send document
                      file_id = await app.upload(
                          file=str(file_path),
                          progress=progress_callback,
                          progress_args=()   # اطمینان از اینکه callback آرگومان‌های استاندارد: current, total
                      )
                      print("\n✅ File uploaded to Rubika server!")
                      # ۵. ارسال فایل به Saved Messages
                      await app.send_document(
                          "me",
                          file_id,
                          caption="📦 100MB file — speed test"
                      )
                      print("✅ Document sent to Saved Messages!")

              except Exception as e:
                  print(f"\n❌ Upload failed: {e}")
                  exit(1)

              total_time = time.time() - start_time
              print(f"⏱️ Total upload+send time: {total_time:.2f} seconds")
              print(f"🚀 Overall speed: {target_size / total_time / (1024*1024):.2f} MB/s")

          asyncio.run(main())
          PYEOF

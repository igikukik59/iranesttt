name: 🧪 تست آپلود مستقیم و ثبت لینک

on:
  workflow_dispatch:

jobs:
  test_and_record:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    permissions:
      contents: write
    steps:
      - name: 📥 دریافت کد
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}   # برای پوش کردن فایل

      - name: 🚀 اجرای تست و ثبت نتیجه
        run: |
          cat > run_test.cjs << 'ENDSCRIPT'
          const { execSync } = require('child_process');
          const fs = require('fs');

          const TOKEN = process.env.GITHUB_TOKEN;
          const REPO = process.env.GITHUB_REPOSITORY;
          const SIZE_MB = 10;

          function log(msg) { console.log(`[${new Date().toISOString().substr(0,19)}] ${msg}`); }

          // ================ تابع اصلی ================
          (async () => {
            const [owner, repo] = REPO.split('/');
            const api = async (url, opts = {}) => {
              const hdrs = { Authorization: `token ${TOKEN}`, Accept: 'application/vnd.github.v3+json', ...opts.headers };
              const res = await fetch(url, { ...opts, headers: hdrs });
              const data = await res.json().catch(() => ({}));
              if (!res.ok) throw new Error(`API error ${res.status}: ${JSON.stringify(data)}`);
              return data;
            };

            // ۱. ساخت فایل تصادفی
            const filePath = '/tmp/test_file.bin';
            {
              const chunk = Buffer.allocUnsafe(1024 * 1024);
              const fd = fs.openSync(filePath, 'w');
              for (let written = 0; written < SIZE_MB * 1024 * 1024; written += chunk.length) {
                for (let i = 0; i < chunk.length; i++) chunk[i] = Math.floor(Math.random() * 256);
                fs.writeSync(fd, chunk, 0, Math.min(chunk.length, SIZE_MB * 1024 * 1024 - written));
              }
              fs.closeSync(fd);
            }
            log(`فایل ${SIZE_MB}MB ساخته شد.`);

            // ۲. ساخت release
            const tag = `test-${Date.now()}`;
            log(`ساخت release با tag=${tag} ...`);
            const rel = await api(`https://api.github.com/repos/${owner}/${repo}/releases`, {
              method: 'POST',
              body: JSON.stringify({
                tag_name: tag,
                name: 'تست لینک مستقیم',
                body: 'Release موقت برای تست',
                draft: false,
                prerelease: true
              })
            });
            const uploadUrl = rel.upload_url.replace('{?name,label}', '');
            log('Release ساخته شد.');

            // ۳. آپلود asset
            const assetName = 'test_10mb.bin';
            log('در حال آپلود asset...');
            const buf = fs.readFileSync(filePath);
            const assetRes = await fetch(`${uploadUrl}?name=${encodeURIComponent(assetName)}`, {
              method: 'POST',
              headers: {
                Authorization: `token ${TOKEN}`,
                'Content-Type': 'application/octet-stream'
              },
              body: buf
            });
            const asset = await assetRes.json();
            if (!assetRes.ok) throw new Error(`Upload fail: ${JSON.stringify(asset)}`);
            const downloadUrl = asset.browser_download_url;
            log(`✅ آپلود کامل. لینک: ${downloadUrl}`);

            // ۴. نوشتن نتیجه در فایل
            const resultText = 
              `زمان تست: ${new Date().toISOString()}\n` +
              `حجم فایل: ${SIZE_MB} مگابایت\n` +
              `لینک مستقیم دانلود:\n${downloadUrl}\n\n` +
              `⚠️ لطفاً این لینک را در مرورگر یا دانلود منیجر امتحان کنید.\n` +
              `(Release موقت است و تا پاک‌کردن دستی باقی می‌ماند.)\n`;
            fs.writeFileSync('test_link.txt', resultText, 'utf8');
            log('فایل test_link.txt ایجاد شد.');

            // ۵. پوش کردن فایل به ریپو
            execSync('git config user.name "github-actions[bot]"', {stdio:'pipe'});
            execSync('git config user.email "github-actions[bot]@users.noreply.github.com"', {stdio:'pipe'});
            execSync('git add test_link.txt', {stdio:'pipe'});
            try { execSync('git commit -m "📎 ثبت لینک تست مستقیم"', {stdio:'pipe'}); } catch(e) {}
            execSync('git push', {stdio:'pipe'});
            log('📤 فایل test_link.txt با موفقیت پوش شد. اکنون در ریپو قابل مشاهده است.');
          })().catch(err => {
            console.error('❌ شکست:', err.message);
            // حتی در صورت خطا، فایل خطا رو هم می‌نویسیم
            fs.writeFileSync('test_link.txt', `❌ خطا رخ داد:\n${err.message}\nلطفاً لاگ Actions را بررسی کنید.`, 'utf8');
            execSync('git add test_link.txt && git commit -m "ثبت خطای تست" && git push', {stdio:'pipe'});
            process.exit(1);
          });
          ENDSCRIPT

          node run_test.cjs

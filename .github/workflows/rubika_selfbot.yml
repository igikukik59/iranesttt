name: Connect to Rubika via Session

on:
  workflow_dispatch:  # فقط اجرای دستی

jobs:
  connect:
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install rubpy python-dotenv

      - name: 📁 Prepare session file
        run: |
          # کتابخونه rubpy به‌طور پیش‌فرض دنبال rubika_session.session می‌گرده
          # فایل rubika_session.rp که تو ریپو هست رو به اسم استاندارد کپی می‌کنیم
          if [ -f rubika_session.rp ]; then
            cp rubika_session.rp rubika_session.session
            echo "✅ Session file copied to rubika_session.session"
          else
            echo "❌ rubika_session.rp not found!"
            exit 1
          fi

      - name: 🚀 Run connection script
        run: |
          python << 'PYEOF'
          import asyncio
          import sys
          from rubpy import Client

          if sys.platform == 'win32':
              asyncio.set_event_loop_policy(asyncio.WindowsSelectorEventLoopPolicy())

          client = Client(name='rubika_session')  # rubika_session.session رو می‌خونه
          try:
              client.start()
              print('✅ Connected to Rubika successfully!')
              # ارسال یک پیام تأیید به خودت
              client.send_message('me', '✅ GitHub Actions connected successfully!')
              print('📤 Test message sent to Saved Messages.')
          finally:
              client.disconnect()
              print('🔌 Disconnected.')
          PYEOF

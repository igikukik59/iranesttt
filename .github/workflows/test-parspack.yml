name: 🧪 تست لینک مستقیم گیت‌هاب (Release API)

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}      # 👈 توکن رو می‌ریزیم توی env
    steps:
      - name: 📥 دریافت کد
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🚀 اجرای تست
        run: |
          cat > run_test.cjs << 'ENDSCRIPT'
          const { execSync } = require('child_process');
          const fs = require('fs');

          // 🔧 تنظیم هویت git (اولین کار)
          execSync('git config user.name "github-actions[bot]"', {stdio:'pipe'});
          execSync('git config user.email "github-actions[bot]@users.noreply.github.com"', {stdio:'pipe'});

          const TOKEN = process.env.GITHUB_TOKEN;
          const REPO = process.env.GITHUB_REPOSITORY;
          const SIZE_MB = 10;

          if (!TOKEN) {
            console.error('❌ توکن گیت‌هاب در env پیدا نشد.');
            process.exit(1);
          }

          function log(msg) {
            console.log(`[${new Date().toISOString().substring(0,19)}] ${msg}`);
          }

          (async () => {
            const [owner, repo] = REPO.split('/');

            // ۱. ساخت فایل تصادفی ۱۰MB
            log(`ساخت فایل تصادفی ${SIZE_MB}MB...`);
            const filePath = '/tmp/test_10mb.bin';
            {
              const chunk = Buffer.allocUnsafe(1024 * 1024);
              const fd = fs.openSync(filePath, 'w');
              for (let written = 0; written < SIZE_MB * 1024 * 1024; written += chunk.length) {
                for (let i = 0; i < chunk.length; i++) chunk[i] = Math.floor(Math.random() * 256);
                fs.writeSync(fd, chunk, 0, Math.min(chunk.length, SIZE_MB * 1024 * 1024 - written));
              }
              fs.closeSync(fd);
            }

            // ۲. ایجاد Release
            const tag = `test-${Date.now()}`;
            log(`درخواست Release جدید با tag=${tag}...`);
            const rel = await fetch(`https://api.github.com/repos/${owner}/${repo}/releases`, {
              method: 'POST',
              headers: {
                Authorization: `token ${TOKEN}`,
                'Content-Type': 'application/json'
              },
              body: JSON.stringify({
                tag_name: tag,
                name: 'تست لینک مستقیم',
                draft: false,
                prerelease: true
              })
            }).then(r => r.json());
            if (!rel.upload_url) throw new Error(`ساخت Release شکست: ${JSON.stringify(rel)}`);
            const uploadUrl = rel.upload_url.replace('{?name,label}', '');
            log('✅ Release ساخته شد.');

            // ۳. آپلود فایل به Release
            log('📤 آپلود asset...');
            const buf = fs.readFileSync(filePath);
            const asset = await fetch(`${uploadUrl}?name=test_10mb.bin`, {
              method: 'POST',
              headers: {
                Authorization: `token ${TOKEN}`,
                'Content-Type': 'application/octet-stream'
              },
              body: buf
            }).then(r => r.json());
            if (!asset.browser_download_url) throw new Error(`آپلود ناموفق: ${JSON.stringify(asset)}`);

            const downloadUrl = asset.browser_download_url;
            log(`🎉 موفق! لینک مستقیم:\n${downloadUrl}`);

            // ۴. ذخیره لینک در ریپو
            const output = `لینک تست مستقیم:\n${downloadUrl}\n\nزمان: ${new Date().toISOString()}\nحجم: ${SIZE_MB}MB\n`;
            fs.writeFileSync('test_link.txt', output);
            execSync('git add test_link.txt', {stdio:'pipe'});
            execSync('git commit -m "📎 ذخیره لینک تست مستقیم"', {stdio:'pipe'});
            execSync('git push', {stdio:'pipe'});
            log('📤 فایل test_link.txt در ریپو ذخیره شد. آن را باز کن و لینک را تست کن.');
          })().catch(err => {
            console.error('❌ خطا:', err.message);
            // در صورت خطا هم فایل را با پیام خطا می‌سازیم
            const errorMsg = `❌ خطا در تست:\n${err.message}\nزمان: ${new Date().toISOString()}`;
            fs.writeFileSync('test_link.txt', errorMsg);
            try {
              execSync('git add test_link.txt && git commit -m "ثبت خطای تست" && git push', {stdio:'pipe'});
            } catch(e) {}
            process.exit(1);
          });
          ENDSCRIPT

          node run_test.cjs

          async function highlightClickableElements(page) {
            return await page.evaluate(() => {
              document.querySelectorAll('.rubika-hl-badge, .rubika-hl-overlay').forEach(el => el.remove());
              document.querySelectorAll('[data-rubika-sel-id]').forEach(el => el.removeAttribute('data-rubika-sel-id'));

              const baseSelectors = [
                'a', 'button', 'input', 'select', 'textarea', 'area', 'summary', 'details', 'label',
                '[onclick]',
                '[role="button"]', '[role="menuitem"]', '[role="option"]', '[role="tab"]',
                '[role="link"]', '[role="listbox"]', '[role="combobox"]', '[role="menu"]',
                '[role="menubar"]', '[role="treeitem"]', '[role="gridcell"]', '[role="row"]',
                '[role="switch"]', '[role="checkbox"]', '[role="radio"]', '[role="textbox"]',
                '[role="searchbox"]', '[role="spinbutton"]', '[role="slider"]', '[role="separator"]',
                '[tabindex]:not([tabindex="-1"])', '[contenteditable="true"]',
                'div[role]', 'span[role]', 'li[role]',
                '[class*="play"]', '[class*="pause"]', '[class*="control"]',
                '[class*="forward"]', '[class*="back"]', '[class*="next"]', '[class*="prev"]',
                '[aria-label*="Play"]', '[aria-label*="Pause"]', '[aria-label*="Mute"]'
              ];

              const elements = new Set();
              function collect(root) {
                try { root.querySelectorAll(baseSelectors.join(',')).forEach(el => elements.add(el)); } catch(e) {}
                root.querySelectorAll('*').forEach(node => { if (node.shadowRoot) collect(node.shadowRoot); });
                root.querySelectorAll('iframe').forEach(iframe => {
                  try {
                    const doc = iframe.contentDocument || iframe.contentWindow.document;
                    if (doc) collect(doc);
                  } catch(e) {}
                });
              }
              collect(document);

              const visible = Array.from(elements).filter(el => {
                const rect = el.getBoundingClientRect();
                return rect.width > 0 && rect.height > 0 &&
                       rect.bottom > 0 && rect.top < window.innerHeight &&
                       rect.right > 0 && rect.left < window.innerWidth;
              });

              visible.sort((a,b) => {
                const ra = a.getBoundingClientRect(), rb = b.getBoundingClientRect();
                if (Math.abs(ra.top - rb.top) < 5) return ra.left - rb.left;
                return ra.top - rb.top;
              });

              visible.forEach((el, idx) => {
                const num = idx + 1;
                el.setAttribute('data-rubika-sel-id', num);
                const rect = el.getBoundingClientRect();
                const overlay = document.createElement('div');
                overlay.className = 'rubika-hl-overlay';
                overlay.style.cssText = `position:fixed;top:${Math.max(0,rect.top)}px;left:${Math.max(0,rect.left)}px;width:${Math.min(rect.width,window.innerWidth-rect.left)}px;height:${Math.min(rect.height,window.innerHeight-rect.top)}px;background:rgba(255,0,0,0.1);border:2px dashed red;z-index:999996;pointer-events:none;box-sizing:border-box`;
                document.body.appendChild(overlay);
                const badge = document.createElement('div');
                badge.className = 'rubika-hl-badge';
                badge.style.cssText = `position:fixed;top:${Math.max(2,rect.top-6)}px;left:${Math.max(2,rect.left-6)}px;background:black;color:white;border-radius:50%;width:20px;height:20px;font-size:11px;line-height:20px;text-align:center;font-weight:bold;z-index:999999;pointer-events:none;box-shadow:0 0 4px rgba(0,0,0,0.5)`;
                badge.textContent = num;
                document.body.appendChild(badge);

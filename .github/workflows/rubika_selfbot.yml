name: Upload to Rubika Saved Messages

on:
  workflow_dispatch:   # فقط دستی اجرا می‌شه

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install rubpy python-dotenv

      - name: Restore Rubika session from secret
        run: |
          printf '%s' "${{ secrets.SESSION_DATA }}" | base64 -d > rubika_session.session
        shell: bash

      - name: Run upload script
        env:
          RUBIKA_SESSION_FILE: rubika_session.session
        run: python upload_action.py

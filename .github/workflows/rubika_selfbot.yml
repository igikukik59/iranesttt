name: 🔄 آپلود ۱۰۰MB با تلاش مجدد کلی (ضد ۵۰۳)

on:
  workflow_dispatch:

jobs:
  robust-whole-retry:
    runs-on: ubuntu-latest
    env:
      SESSION_B64: ${{ secrets.SESSION_DATA }}
      SESSION_NAME: my_account
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 📦 نصب کتابخانه
        run: pip install rubpy==7.3.5

      - name: 🔐 بازیابی سشن
        run: echo "$SESSION_B64" | base64 -d > $SESSION_NAME.rp

      - name: 🐍 ارسال با تلاش کلی و زمان انتظار
        run: |
          python -c "
          import asyncio, sys, time, traceback

          from rubpy import Client

          MAX_ATTEMPTS = 5
          RETRY_DELAY = 30  # ثانیه بین تلاش‌ها

          async def progress_cb(current, total):
              pct = (current / total) * 100 if total else 0
              print(f'[PROGRESS] {current:,}/{total:,} bytes ({pct:.1f}%)')

          async def main():
              async with Client(name='$SESSION_NAME', timeout=1200) as app:
                  print('✅ ورود انجام شد.')
                  file_name = 'test_100mb.bin'
                  with open(file_name, 'wb') as f:
                      f.write(b'\0' * 100 * 1024 * 1024)
                  print('📁 فایل ۱۰۰MB آماده شد.')

                  for attempt in range(1, MAX_ATTEMPTS+1):
                      try:
                          print(f'⏳ تلاش {attempt}/{MAX_ATTEMPTS} ...')
                          start = time.time()
                          result = await app.send_document(
                              object_guid='me',
                              document=file_name,
                              caption=f'✅ تست مقاوم ۱۰۰MB - تلاش {attempt}',
                              progress=progress_cb
                          )
                          elapsed = time.time() - start
                          print(f'🎉 ارسال موفق در تلاش {attempt}! زمان: {elapsed:.1f}s')
                          print('پاسخ:', result)
                          return  # موفقیت‌آمیز -> خارج شو
                      except Exception as e:
                          print(f'❌ تلاش {attempt} شکست خورد:')
                          traceback.print_exc()
                          if attempt < MAX_ATTEMPTS:
                              print(f'⏱️ صبر {RETRY_DELAY} ثانیه قبل از تلاش بعدی...')
                              await asyncio.sleep(RETRY_DELAY)
                          else:
                              print('🛑 تمام تلاش‌ها ناموفق بود.')
                              sys.exit(1)

          asyncio.run(main())
          "

name: Download teleMirror Release

on:
  workflow_dispatch:  # دستی اجرا میکنی از تب Actions

jobs:
  download-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download release asset
        run: |
          curl -L -o tele-mirror-win-arm64.zip "https://release-assets.githubusercontent.com/github-production-release-asset/1227802761/3df088c2-114e-4b15-9a7c-5258b4d434ae?sp=r&sv=2018-11-09&sr=b&spr=https&se=2026-05-08T11%3A15%3A08Z&rscd=attachment%3B+filename%3Dtele-mirror-win-arm64.zip&rsct=application%2Foctet-stream&skoid=96c2d410-5711-43a1-aedd-ab1947aa7ab0&sktid=398a6654-997b-47e9-b12b-9515b896b4de&skt=2026-05-08T10%3A14%3A41Z&ske=2026-05-08T11%3A15%3A08Z&sks=b&skv=2018-11-09&sig=TcTMna1%2FnLWnH1j42o9RPCKqbTsDrMDaKOub3bIOCQQ%3D&jwt=eyJ0eXAiOiJKV1QiLCJhbGciOiJIUzI1NiJ9.eyJpc3MiOiJnaXRodWIuY29tIiwiYXVkIjoicmVsZWFzZS1hc3NldHMuZ2l0aHVidXNlcmNvbnRlbnQuY29tIiwia2V5Ijoia2V5MSIsImV4cCI6MTc3ODIzOTU1MiwibmJmIjoxNzc4MjM1OTUyLCJwYXRoIjoicmVsZWFzZWFzc2V0cHJvZHVjdGlvbi5ibG9iLmNvcmUud2luZG93cy5uZXQifQ.uTCIq1n_AP718trW3RMQUVSdu1QWX46qmVRHftiy4Dk&response-content-disposition=attachment%3B%20filename%3Dtele-mirror-win-arm64.zip&response-content-type=application%2Foctet-stream"

      - name: Commit and push file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tele-mirror-win-arm64.zip
          git commit -m "Add teleMirror build" || echo "No changes to commit"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

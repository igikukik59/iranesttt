name: 🌐 مرورگر راه دور (نسخه نهایی با تبدیل خودکار ویدیو)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */5 * * *'

jobs:
  remote-browser:
    runs-on: ubuntu-latest
    timeout-minutes: 290
    permissions:
      contents: write
    steps:
      - name: 📥 دریافت کد
        uses: actions/checkout@v4

      - name: 🦕 نصب Deno (برای yt-dlp)
        uses: denoland/setup-deno@v1
        with:
          deno-version: v1.x

      - name: 🧰 نصب ابزارها
        run: |
          sudo apt-get update -qq && sudo apt-get install -y curl unzip python3-pip ffmpeg
          pip install yt-dlp
          wget -q https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip -O /tmp/xray.zip
          unzip -q /tmp/xray.zip -d xray && chmod +x xray/xray
          npm init -y
          npm install puppeteer puppeteer-extra puppeteer-extra-plugin-stealth

      - name: 🧹 پاک‌سازی حافظه
        run: |
          echo "پاکسازی فایل‌های موقت..."
          rm -rf /tmp/downloaded_videos /tmp/downloaded_images /tmp/downloaded_files /tmp/video_chunks_* /tmp/xray_*.json /tmp/shot_* /tmp/sel_* /tmp/vid_* /tmp/img_* /tmp/scroll_* /tmp/fullshot_* /tmp/page_* 2>/dev/null
          df -h /tmp

      - name: 🤖 اجرای ربات (نسخه نهایی کامل)
        env:
          RUBIKA_BOT_TOKEN: ${{ secrets.RUBIKA_BOT_TOKEN }}
          RUBIKA_OWNER_CHAT_ID: ${{ secrets.RUBIKA_OWNER_CHAT_ID }}
        run: |
          cat > agent.cjs << 'ENDSCRIPT'
          const { spawn, execSync } = require('child_process');
          const fs = require('fs');
          const path = require('path');
          const puppeteer = require('puppeteer-extra');
          const StealthPlugin = require('puppeteer-extra-plugin-stealth');
          puppeteer.use(StealthPlugin());

          const PROXY_FILE = 'کانفیگ های خوب.txt';
          const TARGET_URL = 'https://duckduckgo.com';

          function ts() { return new Date().toISOString().replace('T',' ').substring(0,19); }
          function log(...args) { console.log(`[${ts()}]`, ...args); }
          function err(...args) { console.error(`[${ts()}] ❌`, ...args); }
          const sleep = ms => new Promise(r => setTimeout(r, ms));

          // ======================== Xray Helpers ========================
          function parseURI(uri) {
            try {
              const u = new URL(uri);
              return {
                protocol: u.protocol.replace(':',''),
                uuid: u.username,
                address: u.hostname,
                port: u.port,
                params: Object.fromEntries(u.searchParams.entries())
              };
            } catch(e) { return null; }
          }

          function generateXrayConfig(uri) {
            const p = parseURI(uri);
            if (!p) return null;
            const inbound = { port: 10808, protocol: 'socks', settings: { auth: 'noauth', udp: true } };
            let outbound = {
              protocol: p.protocol,
              settings: p.protocol === 'trojan' ? {
                servers: [{ address: p.address, port: parseInt(p.port), password: p.uuid }]
              } : {
                vnext: [{ address: p.address, port: parseInt(p.port), users: [{ id: p.uuid, encryption: p.params.encryption || 'none', flow: p.params.flow || '' }] }]
              },
              streamSettings: { network: p.params.type || 'tcp' }
            };
            const network = p.params.type || 'tcp';
            outbound.streamSettings.network = network;
            if (network === 'ws') {
              outbound.streamSettings.wsSettings = {
                path: p.params.path || '/',
                headers: p.params.host ? { Host: p.params.host } : {}
              };
            }
            const security = p.params.security || 'none';
            if (security === 'tls' || security === 'reality') {
              outbound.streamSettings.security = security;
              const tls = { serverName: p.params.sni || p.address };
              if (security === 'reality') {
                tls.fingerprint = p.params.fp || 'chrome';
                tls.publicKey = p.params.pbk || '';
                tls.shortId = p.params.sid || '';
                tls.spiderX = '';
              }
              if (p.params.allowInsecure === '1') tls.allowInsecure = true;
              if (p.params.alpn) tls.alpn = p.params.alpn.split(',');
              outbound.streamSettings.tlsSettings = tls;
            } else {
              outbound.streamSettings.security = 'none';
            }
            return { inbounds: [inbound], outbounds: [outbound] };
          }

          async function startXray(uri, idx) {
            const config = generateXrayConfig(uri);
            if (!config) return null;
            const cfgPath = `/tmp/xray_${idx}.json`;
            fs.writeFileSync(cfgPath, JSON.stringify(config, null, 2));
            const xray = spawn(path.join(process.cwd(), 'xray', 'xray'), ['run', '-config', cfgPath], { stdio: 'pipe' });
            await new Promise(r => setTimeout(r, 4000));
            return xray;
          }

          function testCurl(port) {
            try {
              execSync(`curl --socks5 127.0.0.1:${port} --max-time 5 -s http://ip-api.com/json`, { encoding: 'utf8' });
              return true;
            } catch(e) { return false; }
          }

          // ======================== Rubika API (retry) ========================
          const TOKEN = process.env.RUBIKA_BOT_TOKEN;
          const OWNER = process.env.RUBIKA_OWNER_CHAT_ID || '';
          const BASE = `https://botapi.rubika.ir/v3/${TOKEN}`;

          async function api(method, body = {}, retries = 3) {
            const url = `${BASE}/${method}`;
            for (let attempt = 0; attempt < retries; attempt++) {
              try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 30000);
                const res = await fetch(url, {
                  method: 'POST',
                  headers: {'Content-Type':'application/json'},
                  body: JSON.stringify(body),
                  signal: controller.signal
                });
                clearTimeout(timeoutId);
                const text = await res.text();
                let data;
                try { data = JSON.parse(text); } catch(e) {
                  if (attempt < retries - 1) { await sleep(2000 * (attempt + 1)); continue; }
                  err(`⚠️ پاسخ ${method} JSON نیست:`, text.substring(0, 300));
                  return { error: true, raw: text };
                }
                return data;
              } catch(e) {
                if (attempt < retries - 1) {
                  log(`🔄 تلاش مجدد ${method} (${attempt+2}/${retries})...`);
                  await sleep(2000 * (attempt + 1));
                  continue;
                }
                err(`🚨 خطای شبکه در ${method}:`, e.message);
                return { error: true, message: e.message };
              }
            }
          }

          async function sendMessage(chatId, text, extra = {}) {
            return await api('sendMessage', { chat_id: chatId, text, ...extra });
          }

          async function deleteMessage(chatId, messageId) {
            if (!messageId) return;
            return await api('deleteMessage', { chat_id: chatId, message_id: messageId });
          }

          // ======================== آپلود فایل ========================
          async function uploadSingleFile(filePath, fileType) {
            const reqRes = await api('requestSendFile', { type: fileType });
            const uploadUrl = reqRes?.data?.upload_url;
            if (!uploadUrl) { err('upload_url دریافت نشد'); return null; }

            const buf = fs.readFileSync(filePath);
            const form = new FormData();
            form.append('file', new Blob([buf], { type: 'application/octet-stream' }), path.basename(filePath));

            const upRes = await fetch(uploadUrl, { method: 'POST', body: form });
            const upText = await upRes.text();
            let upJson = {};
            try { upJson = JSON.parse(upText); } catch(e) {}
            const fileId = upJson?.file_id || upJson?.data?.file_id;
            if (!fileId) { err('file_id یافت نشد'); return null; }
            return fileId;
          }

          async function sendFileToChat(chatId, fileId, text = '', keypad = null, keypadType = 'New') {
            const sendBody = { chat_id: chatId, file_id: fileId, text };
            if (keypad) {
              sendBody.chat_keypad = keypad;
              sendBody.chat_keypad_type = keypadType;
            }
            const sendRes = await api('sendFile', sendBody);
            return sendRes?.data?.message_id || null;
          }

          async function uploadAndSendFileNormal(chatId, filePath, fileType, caption = '', keypad = null) {
            const fileId = await uploadSingleFile(filePath, fileType);
            if (!fileId) return false;
            const msgId = await sendFileToChat(chatId, fileId, caption, keypad);
            return !!msgId;
          }

          // ======================== تبدیل خودکار ویدیو به h264 + AAC ========================
          async function ensureCompatibleVideo(inputPath) {
            // بررسی کدک با ffprobe
            try {
              const probe = execSync(`ffprobe -v error -select_streams v:0 -show_entries stream=codec_name -of default=noprint_wrappers=1:nokey=1 "${inputPath}"`, { encoding: 'utf8' }).trim();
              if (probe === 'h264') {
                // در حال حاضر h264 است، بررسی صدا (اختیاری، ولی معمولاً اگر صدا aac نباشد روبیکا رد نمی‌کند)
                const audioProbe = execSync(`ffprobe -v error -select_streams a:0 -show_entries stream=codec_name -of default=noprint_wrappers=1:nokey=1 "${inputPath}"`, { encoding: 'utf8' }).trim();
                if (audioProbe === 'aac') {
                  log('ویدیو از قبل h264 + AAC است.');
                  return inputPath; // سازگار است
                }
              }
            } catch(e) { /* اگر ffprobe خطا داد، تبدیل می‌کنیم */ }

            log('ویدیو نیاز به تبدیل دارد...');
            const convertedPath = inputPath.replace(/\.\w+$/, '_converted.mp4');
            try {
              execSync(`ffmpeg -i "${inputPath}" -c:v libx264 -c:a aac -movflags +faststart "${convertedPath}"`, { stdio: 'inherit', timeout: 600000 });
              return convertedPath;
            } catch(e) {
              err('تبدیل با ffmpeg شکست:', e.message);
              return null;
            }
          }

          // ======================== تقسیم هوشمند ویدیو ========================
          async function splitAndSendVideo(chatId, videoPath, baseName, keypad) {
            const stats = fs.statSync(videoPath);
            const sizeMB = (stats.size / (1024 * 1024)).toFixed(1);
            log(`🎬 تقسیم ویدیو ${baseName} (${sizeMB}MB) به قطعات ۲ دقیقه‌ای...`);

            let segmentTime = 120;
            let success = false;

            while (segmentTime >= 30) {
              const chunkDir = `/tmp/video_chunks_${Date.now()}`;
              fs.mkdirSync(chunkDir, { recursive: true });
              const outputPattern = path.join(chunkDir, 'part_%03d.mp4');

              try {
                execSync(
                  `ffmpeg -i "${videoPath}" -c copy -f segment -segment_time ${segmentTime} -reset_timestamps 1 "${outputPattern}"`,
                  { stdio: 'inherit', timeout: 600000 }
                );
              } catch(e) {
                err('تقسیم با ffmpeg شکست:', e.message);
                fs.rmdirSync(chunkDir, { recursive: true });
                return false;
              }

              const chunks = fs.readdirSync(chunkDir)
                .filter(f => f.endsWith('.mp4'))
                .sort((a,b) => {
                  const numA = parseInt(a.match(/\d+/)[0]);
                  const numB = parseInt(b.match(/\d+/)[0]);
                  return numA - numB;
                });

              if (chunks.length === 0) {
                fs.rmdirSync(chunkDir, { recursive: true });
                return false;
              }

              const tooLarge = chunks.some(f => fs.statSync(path.join(chunkDir, f)).size > 50 * 1024 * 1024);
              if (tooLarge) {
                log(`⚠️ قطعه‌ای بیش از ۵۰MB، کاهش زمان قطعه به ${segmentTime / 2} ثانیه`);
                fs.rmdirSync(chunkDir, { recursive: true });
                segmentTime = Math.floor(segmentTime / 2);
                continue;
              }

              const total = chunks.length;
              await sendMessage(chatId, `📦 ویدیو به ${total} قطعه mp4 تقسیم و ارسال می‌شود...`);

              for (let i = 0; i < chunks.length; i++) {
                const chunkPath = path.join(chunkDir, chunks[i]);
                const chunkName = `${baseName}.part${String(i+1).padStart(2,'0')}.mp4`;
                const chunkSize = (fs.statSync(chunkPath).size / (1024 * 1024)).toFixed(1);
                log(`📤 قطعه ${i+1}/${total}: ${chunkName} (${chunkSize}MB)`);

                const finalPath = path.join(chunkDir, chunkName);
                fs.renameSync(chunkPath, finalPath);

                const fileId = await uploadSingleFile(finalPath, 'Video');
                if (!fileId) {
                  err(`❌ آپلود قطعه ${i+1} ناموفق`);
                  await sendMessage(chatId, `❌ خطا در ارسال قطعه ${i+1}/${total}`);
                  try { fs.unlinkSync(finalPath); } catch(e) {}
                  continue;
                }

                const isLast = (i === chunks.length - 1);
                const caption = isLast ? `🎬 ${baseName} (قطعه آخر)` : `📦 ${chunkName} (${chunkSize}MB)`;
                await sendFileToChat(chatId, fileId, caption, (isLast ? keypad : null));
                await sleep(3000);
                try { fs.unlinkSync(finalPath); } catch(e) {}
              }

              fs.rmdirSync(chunkDir, { recursive: true });
              success = true;
              break;
            }

            if (!success) {
              err('تقسیم ویدیو به قطعات زیر ۵۰MB ممکن نشد.');
              await sendMessage(chatId, '❌ حجم ویدیو بیش از حد بالاست، امکان ارسال وجود ندارد.');
              return false;
            }
            return true;
          }

          // ======================== کی‌پد کنترلی ========================
          function buildControlKeypad() {
            return {
              rows: [
                { buttons: [
                    { id: "SCROLL_UP",   type: "Simple", button_text: "⬆️ اسکرول بالا" },
                    { id: "SCROLL_DOWN", type: "Simple", button_text: "⬇️ اسکرول پایین" }
                ]},
                { buttons: [
                    { id: "TYPE",        type: "Simple", button_text: "⌨️ تایپ" },
                    { id: "GO_URL",      type: "Simple", button_text: "🌐 آدرس جدید" }
                ]},
                { buttons: [
                    { id: "SELECT",      type: "Simple", button_text: "🔍 انتخاب با شماره" },
                    { id: "EXTRACT_TEXT",type: "Simple", button_text: "📋 متن قابل مشاهده" }
                ]},
                { buttons: [
                    { id: "VIDEOS",      type: "Simple", button_text: "🎥 ویدیوها" },
                    { id: "IMAGES",      type: "Simple", button_text: "🖼️ تصاویر" },
                    { id: "FILES",       type: "Simple", button_text: "📁 فایل‌ها" }
                ]},
                { buttons: [
                    { id: "FULL_SCREENSHOT", type: "Simple", button_text: "🖼️ اسکرین‌شات کامل" },
                    { id: "SAVE_PDF",    type: "Simple", button_text: "📄 ذخیره PDF" }
                ]},
                { buttons: [
                    { id: "ZOOM_IN",    type: "Simple", button_text: "🔍 زوم +" },
                    { id: "ZOOM_OUT",   type: "Simple", button_text: "🔍 زوم -" },
                    { id: "SCREENSHOT", type: "Simple", button_text: "📸 اسکرین‌شات" }
                ]},
                { buttons: [
                    { id: "ENTER",       type: "Simple", button_text: "↵ Enter" },
                    { id: "REFRESH",     type: "Simple", button_text: "🔄 رفرش" },
                    { id: "GO_BACK",     type: "Simple", button_text: "🠔 عقب" }
                ]},
                { buttons: [
                    { id: "CHANGE_PROXY",type: "Simple", button_text: "🔁 پروکسی" },
                    { id: "HELP",        type: "Simple", button_text: "❓ راهنما" },
                    { id: "CANCEL",      type: "Simple", button_text: "✖️ لغو" }
                ]}
              ],
              resize_keyboard: true,
              one_time_keyboard: false
            };
          }

          // ======================== انتخاب هوشمند ========================
          async function highlightClickableElements(page) {
            return await page.evaluate(() => {
              document.querySelectorAll('.rubika-hl-badge, .rubika-hl-overlay').forEach(el => el.remove());
              document.querySelectorAll('[data-rubika-sel-id]').forEach(el => el.removeAttribute('data-rubika-sel-id'));

              const baseSelectors = [
                'a', 'button', 'input', 'select', 'textarea', 'area', 'summary', 'details', 'label',
                '[onclick]',
                '[role="button"]', '[role="menuitem"]', '[role="option"]', '[role="tab"]',
                '[role="link"]', '[role="listbox"]', '[role="combobox"]', '[role="menu"]',
                '[role="menubar"]', '[role="treeitem"]', '[role="gridcell"]', '[role="row"]',
                '[role="switch"]', '[role="checkbox"]', '[role="radio"]', '[role="textbox"]',
                '[role="searchbox"]', '[role="spinbutton"]', '[role="slider"]', '[role="separator"]',
                '[tabindex]:not([tabindex="-1"])', '[contenteditable="true"]',
                'div[role]', 'span[role]', 'li[role]',
                '[class*="play"]', '[class*="pause"]', '[class*="control"]',
                '[class*="forward"]', '[class*="back"]', '[class*="next"]', '[class*="prev"]',
                '[aria-label*="Play"]', '[aria-label*="Pause"]', '[aria-label*="Mute"]'
              ];

              const elements = new Set();
              function collect(root) {
                try { root.querySelectorAll(baseSelectors.join(',')).forEach(el => elements.add(el)); } catch(e) {}
                root.querySelectorAll('*').forEach(node => { if (node.shadowRoot) collect(node.shadowRoot); });
                root.querySelectorAll('iframe').forEach(iframe => {
                  try {
                    const doc = iframe.contentDocument || iframe.contentWindow.document;
                    if (doc) collect(doc);
                  } catch(e) {}
                });
              }
              collect(document);

              const visible = Array.from(elements).filter(el => {
                const rect = el.getBoundingClientRect();
                return rect.width > 0 && rect.height > 0 &&
                       rect.bottom > 0 && rect.top < window.innerHeight &&
                       rect.right > 0 && rect.left < window.innerWidth;
              });

              visible.sort((a,b) => {
                const ra = a.getBoundingClientRect(), rb = b.getBoundingClientRect();
                if (Math.abs(ra.top - rb.top) < 5) return ra.left - rb.left;
                return ra.top - rb.top;
              });

              visible.forEach((el, idx) => {
                const num = idx + 1;
                el.setAttribute('data-rubika-sel-id', num);
                const rect = el.getBoundingClientRect();
                const overlay = document.createElement('div');
                overlay.className = 'rubika-hl-overlay';
                overlay.style.cssText = `position:fixed;top:${Math.max(0,rect.top)}px;left:${Math.max(0,rect.left)}px;width:${Math.min(rect.width,window.innerWidth-rect.left)}px;height:${Math.min(rect.height,window.innerHeight-rect.top)}px;background:rgba(255,0,0,0.1);border:2px dashed red;z-index:999996;pointer-events:none;box-sizing:border-box`;
                document.body.appendChild(overlay);
                const badge = document.createElement('div');
                badge.className = 'rubika-hl-badge';
                badge.style.cssText = `position:fixed;top:${Math.max(2,rect.top-6)}px;left:${Math.max(2,rect.left-6)}px;background:black;color:white;border-radius:50%;width:20px;height:20px;font-size:11px;line-height:20px;text-align:center;font-weight:bold;z-index:999999;pointer-events:none;box-shadow:0 0 4px rgba(0,0,0,0.5)`;
                badge.textContent = num;
                document.body.appendChild(badge);
              });

              return visible.length;
            });
          }

          async function removeHighlights(page) {
            await page.evaluate(() => {
              document.querySelectorAll('.rubika-hl-badge, .rubika-hl-overlay').forEach(el => el.remove());
              document.querySelectorAll('[data-rubika-sel-id]').forEach(el => el.removeAttribute('data-rubika-sel-id'));
            });
          }

          async function clickByNumber(page, number) {
            try {
              const found = await page.evaluate((num) => {
                const el = document.querySelector(`[data-rubika-sel-id="${num}"]`);
                if (!el) return false;
                el.scrollIntoView({ block: 'center', inline: 'center' });
                el.focus({ preventScroll: true });
                return true;
              }, number);
              if (!found) return false;
              const navPromise = page.waitForNavigation({ waitUntil: 'networkidle2', timeout: 8000 }).catch(() => null);
              await page.evaluate((num) => {
                const el = document.querySelector(`[data-rubika-sel-id="${num}"]`);
                if (el) { if (el.tagName === 'A' && el.target === '_blank') el.target = '_self'; el.click(); }
              }, number);
              await navPromise;
              await sleep(1000);
              return true;
            } catch(e) { log('⚠️ مدیریت ناوبری کلیک'); await sleep(2000); return true; }
          }

          // ======================== اسکرول هوشمند ========================
          async function highlightScrollableAreas(page) {
            return await page.evaluate(() => {
              document.querySelectorAll('.rubika-hl-badge, .rubika-hl-overlay').forEach(el => el.remove());
              document.querySelectorAll('[data-rubika-scroll-id]').forEach(el => el.removeAttribute('data-rubika-scroll-id'));

              const areas = [];
              const docEl = document.documentElement;
              if (docEl.scrollHeight > window.innerHeight) {
                areas.push({ type: 'window', rect: { top:0, left:0, width: window.innerWidth, height: window.innerHeight } });
              }

              const all = document.querySelectorAll('*');
              all.forEach(el => {
                const style = window.getComputedStyle(el);
                const overflowY = style.overflowY;
                if ((overflowY === 'auto' || overflowY === 'scroll') && el.scrollHeight > el.clientHeight) {
                  const rect = el.getBoundingClientRect();
                  if (rect.width > 20 && rect.height > 20) {
                    areas.push({ type: 'element', el });
                  }
                }
              });

              areas.forEach((area, idx) => {
                const num = idx + 1;
                if (area.type === 'window') {
                  const overlay = document.createElement('div');
                  overlay.className = 'rubika-hl-overlay';
                  overlay.style.cssText = `position:fixed;top:0;left:0;width:100vw;height:100vh;background:rgba(0,255,0,0.05);border:2px dashed green;z-index:999996;pointer-events:none;box-sizing:border-box`;
                  document.body.appendChild(overlay);
                  const badge = document.createElement('div');
                  badge.className = 'rubika-hl-badge';
                  badge.style.cssText = `position:fixed;top:5px;left:5px;background:green;color:white;border-radius:50%;width:24px;height:24px;font-size:12px;line-height:24px;text-align:center;font-weight:bold;z-index:999999;pointer-events:none;box-shadow:0 0 4px rgba(0,0,0,0.5)`;
                  badge.textContent = num;
                  document.body.appendChild(badge);
                } else {
                  const el = area.el;
                  el.setAttribute('data-rubika-scroll-id', num);
                  const rect = el.getBoundingClientRect();
                  const overlay = document.createElement('div');
                  overlay.className = 'rubika-hl-overlay';
                  overlay.style.cssText = `position:fixed;top:${Math.max(0,rect.top)}px;left:${Math.max(0,rect.left)}px;width:${Math.min(rect.width,window.innerWidth-rect.left)}px;height:${Math.min(rect.height,window.innerHeight-rect.top)}px;background:rgba(0,255,0,0.1);border:2px dashed green;z-index:999996;pointer-events:none;box-sizing:border-box`;
                  document.body.appendChild(overlay);
                  const badge = document.createElement('div');
                  badge.className = 'rubika-hl-badge';

          // ======================== استخراج متن با مارک‌داون ========================
          async function extractVisibleText(page) {
            return await page.evaluate(() => {
              const walker = document.createTreeWalker(
                document.body,
                NodeFilter.SHOW_TEXT,
                null,
                false
              );
              const lines = [];
              let node;
              while (node = walker.nextNode()) {
                let text = node.textContent.trim();
                if (!text) continue;
                const parent = node.parentElement;
                if (!parent) continue;
                const style = window.getComputedStyle(parent);
                if (style.display === 'none' || style.visibility === 'hidden') continue;
                const tag = parent.tagName.toLowerCase();
                let prefix = '';
                if (tag === 'h1') prefix = '# ';
                else if (tag === 'h2') prefix = '## ';
                else if (tag === 'h3') prefix = '### ';
                else if (tag === 'h4') prefix = '#### ';
                else if (tag === 'h5') prefix = '##### ';
                else if (tag === 'h6') prefix = '###### ';
                if (parent.tagName === 'STRONG' || parent.tagName === 'B') text = `**${text}**`;
                if (parent.tagName === 'EM' || parent.tagName === 'I') text = `*${text}*`;
                lines.push(prefix + text);
              }
              return lines.join('\n').substring(0, 4000);
            });
          }

          // ======================== دانلودها ========================
          async function downloadImage(url, referer) {
            const dir = '/tmp/downloaded_images';
            if (!fs.existsSync(dir)) fs.mkdirSync(dir, { recursive: true });
            const outPath = path.join(dir, `img_${Date.now()}_${path.basename(new URL(url).pathname) || 'image.jpg'}`);
            try {
              execSync(`curl --socks5 127.0.0.1:10808 -L -e "${referer}" -A "Mozilla/5.0" -o "${outPath}" "${url}"`, { stdio: 'inherit', timeout: 60000 });
              return { ok: true, path: outPath };
            } catch(e) { err('دانلود تصویر خطا:', e.message); return { ok: false }; }
          }

          async function downloadFile(url, referer) {
            const dir = '/tmp/downloaded_files';
            if (!fs.existsSync(dir)) fs.mkdirSync(dir, { recursive: true });
            const outPath = path.join(dir, path.basename(new URL(url).pathname) || `file_${Date.now()}`);
            try {
              execSync(`curl --socks5 127.0.0.1:10808 -L -e "${referer}" -A "Mozilla/5.0" -o "${outPath}" "${url}"`, { stdio: 'inherit', timeout: 120000 });
              return { ok: true, path: outPath };
            } catch(e) { err('دانلود فایل خطا:', e.message); return { ok: false }; }
          }

          async function downloadVideo(url, type, referer, platform, pageUrl) {
            const dir = '/tmp/downloaded_videos';
            if (!fs.existsSync(dir)) fs.mkdirSync(dir, { recursive: true });
            const timestamp = Date.now();

            // دستور yt‑dlp بدون نگرانی از کدک چون بعداً تبدیل می‌کنیم
            const ytDlpCmd = [
              'yt-dlp',
              '--no-playlist',
              '--merge-output-format', 'mp4',
              '--force-ipv4',
              "--user-agent", "'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/125.0.0.0 Safari/537.36'",
              '--extractor-args', 'youtube:player_client=android_vr',
              '--proxy', 'socks5://127.0.0.1:10808'
            ].join(' ');

            if (type === 'direct' && url.startsWith('blob:')) {
              const outPath = path.join(dir, `video_${timestamp}_page.mp4`);
              try {
                execSync(`${ytDlpCmd} -o "${outPath}" "${pageUrl}"`, { stdio: 'inherit', timeout: 600000 });
                return { ok: true, path: outPath };
              } catch(e) { err('yt-dlp blob failed:', e.message); return { ok: false }; }
            }

            if (type === 'direct') {
              const outPath = path.join(dir, `video_${timestamp}_${path.basename(new URL(url).pathname) || 'video.mp4'}`);
              try {
                execSync(`curl --socks5 127.0.0.1:10808 -L -e "${referer}" -A "Mozilla/5.0" -o "${outPath}" "${url}"`, { stdio: 'inherit', timeout: 600000 });
                return { ok: true, path: outPath };
              } catch(e) {
                log('دانلود مستقیم شکست، تلاش با yt-dlp...');
                const fallbackPath = path.join(dir, `video_${timestamp}_page.mp4`);
                try {
                  execSync(`${ytDlpCmd} -o "${fallbackPath}" "${pageUrl}"`, { stdio: 'inherit', timeout: 600000 });
                  return { ok: true, path: fallbackPath };
                } catch(e2) { err('yt-dlp نیز شکست:', e2.message); return { ok: false }; }
              }
            } else if (type === 'embed') {
              const outPath = path.join(dir, `video_${timestamp}_${platform || 'embed'}.mp4`);
              try {
                execSync(`${ytDlpCmd} -o "${outPath}" "${url}"`, { stdio: 'inherit', timeout: 600000 });
                return { ok: true, path: outPath };
              } catch(e) { err('yt-dlp embed شکست:', e.message); return { ok: false }; }
            }
            return { ok: false };
          }


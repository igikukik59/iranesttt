name: Upload to Arvan Cloud Storage

on:
  workflow_dispatch:      # می‌توانید دستی اجرا کنید

jobs:
  upload-and-link:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Download Random Test File
        run: |
          echo "Downloading a sample image..."
          curl -v -L -o sample.jpg "https://picsum.photos/600/400.jpg" 2>&1 | tee curl.log
          ls -lh sample.jpg

      - name: Configure AWS CLI for Arvan
        env:
          # اطلاعات اتصال آروان (مستقیماً در کد، فقط برای تست)
          ACCESS_KEY: 0283fe7f-aa44-4041-8859-c0ee33b2d686
          SECRET_KEY: 79e5d6191420eb757b2b4c8cc44611e9bc2b123175953a08956fb8ac2809bc14
          ENDPOINT: https://s3.ir-thr-at1.arvanstorage.ir
          BUCKET: my-test-bucket   # <--- نام صندوقچه خود را اینجا بگذارید
        run: |
          aws configure set aws_access_key_id "$ACCESS_KEY" --profile arvan
          aws configure set aws_secret_access_key "$SECRET_KEY" --profile arvan
          aws configure set region us-east-1 --profile arvan
          echo "AWS CLI configured for Arvan with profile 'arvan'."

      - name: Generate Unique Object Key
        id: vars
        run: echo "object_key=upload-$(date +%s)-${RANDOM}.jpg" >> $GITHUB_OUTPUT

      - name: Ensure Bucket Exists (optional)
        env:
          BUCKET: my-test-bucket
          ENDPOINT: https://s3.ir-thr-at1.arvanstorage.ir
        run: |
          # سعی می‌کنیم صندوقچه را بسازیم، اگر وجود داشت خطا می‌دهد اما مهم نیست
          aws s3 mb "s3://$BUCKET" \
            --profile arvan \
            --endpoint-url "$ENDPOINT" \
            --region us-east-1 2>&1 || echo "Bucket already exists."

      - name: Upload File to Bucket
        env:
          BUCKET: my-test-bucket
          ENDPOINT: https://s3.ir-thr-at1.arvanstorage.ir
          OBJECT_KEY: ${{ steps.vars.outputs.object_key }}
        run: |
          echo "Uploading sample.jpg to s3://$BUCKET/$OBJECT_KEY..."
          aws s3 cp sample.jpg "s3://$BUCKET/$OBJECT_KEY" \
            --profile arvan \
            --endpoint-url "$ENDPOINT" \
            --no-verify-ssl \
            --debug 2>&1 | tee upload-debug.log
          echo "Upload exit code: $?"

      - name: Generate Pre-signed URL (1 hour valid)
        env:
          BUCKET: my-test-bucket
          ENDPOINT: https://s3.ir-thr-at1.arvanstorage.ir
          OBJECT_KEY: ${{ steps.vars.outputs.object_key }}
        run: |
          echo "Generating pre-signed URL..."
          PRESIGNED=$(aws s3 presign "s3://$BUCKET/$OBJECT_KEY" \
            --profile arvan \
            --endpoint-url "$ENDPOINT" \
            --expires-in 3600 2>&1)
          echo "Pre-signed URL: $PRESIGNED"
          # Save for later
          echo "presigned_url=$PRESIGNED" >> $GITHUB_OUTPUT

      - name: Collect All Logs
        run: |
          echo "=== UPLOAD LOG ===" > upload-log.txt
          echo "Date (UTC): $(date -u)" >> upload-log.txt
          echo "Bucket: my-test-bucket" >> upload-log.txt
          echo "Object: ${{ steps.vars.outputs.object_key }}" >> upload-log.txt
          echo "" >> upload-log.txt
          echo "--- Pre-signed URL ---" >> upload-log.txt
          echo "${{ steps.vars.outputs.presigned_url }}" >> upload-log.txt
          echo "" >> upload-log.txt
          echo "--- Upload Debug Log ---" >> upload-log.txt
          cat upload-debug.log >> upload-log.txt 2>/dev/null || echo "No debug log" >> upload-log.txt
          echo "--- Curl Log ---" >> upload-log.txt
          cat curl.log >> upload-log.txt 2>/dev/null

      - name: Commit and Push Log File
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add upload-log.txt
          git commit -m "Add upload log from workflow run $GITHUB_RUN_ID" || echo "No changes to commit"
          git push origin HEAD:${{ github.ref_name }} || echo "Push failed"

name: 🌐 مرورگر راه دور (نسخه نهایی با تبدیل خودکار ویدیو + آپلود موقت روی GitHub)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */5 * * *'

jobs:
  remote-browser:
    runs-on: ubuntu-latest
    timeout-minutes: 290
    permissions:
      contents: write
    steps:
      - name: 📥 دریافت کد
        uses: actions/checkout@v4

      - name: 🦕 نصب Deno (برای yt-dlp)
        uses: denoland/setup-deno@v1
        with:
          deno-version: v1.x

      - name: 🧰 نصب ابزارها
        run: |
          sudo apt-get update -qq && sudo apt-get install -y curl unzip python3-pip ffmpeg aria2
          pip install yt-dlp
          wget -q https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip -O /tmp/xray.zip
          unzip -q /tmp/xray.zip -d xray && chmod +x xray/xray
          npm init -y
          npm install puppeteer puppeteer-extra puppeteer-extra-plugin-stealth

      - name: 🧹 پاک‌سازی حافظه
        run: |
          echo "پاکسازی فایل‌های موقت..."
          rm -rf /tmp/downloaded_videos /tmp/downloaded_images /tmp/downloaded_files /tmp/video_chunks_* /tmp/video_dl_* /tmp/xray_*.json /tmp/shot_* /tmp/sel_* /tmp/vid_* /tmp/img_* /tmp/scroll_* /tmp/fullshot_* /tmp/page_* 2>/dev/null
          df -h /tmp

      - name: 🤖 اجرای ربات (نسخه نهایی با آپلود GitHub)
        env:
          RUBIKA_BOT_TOKEN: ${{ secrets.RUBIKA_BOT_TOKEN }}
          RUBIKA_OWNER_CHAT_ID: ${{ secrets.RUBIKA_OWNER_CHAT_ID }}
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          cat > agent.cjs << 'ENDSCRIPT'

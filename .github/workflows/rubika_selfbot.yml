name: ✅ اتصال به روبیکا (ورکفلو نهایی)

on:
  workflow_dispatch:

jobs:
  connect:
    runs-on: ubuntu-latest
    env:
      SESSION_B64: ${{ secrets.RUBIKA_SESSION }}
      SESSION_NAME: rubika_session
      SESSION_FILE: rubika_session.rp

    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install rubpy
        run: pip install rubpy==7.3.5

      - name: 🔐 Decode session file
        run: echo "$SESSION_B64" | base64 -d > $SESSION_FILE

      - name: 📋 Check file
        run: ls -la $SESSION_FILE

      - name: 🚀 Connect to Rubika
        run: |
          python -c "
          import asyncio
          from rubpy import Client

          async def main():
              try:
                  async with Client(name='$SESSION_NAME') as app:
                      me = await app.get_me()
                      print('✅ اتصال موفقیت‌آمیز بود!')
                      print('👤 شناسه کاربری:', me.user.user_guid)
                      print('📛 نام:', me.user.first_name, me.user.last_name or '')
                      # ارسال پیام تست به خودت
                      await app.send_message('me', '✅ GitHub Actions connected successfully!')
                      print('📤 پیام تست فرستاده شد.')
              except Exception as e:
                  print('❌ اتصال ناموفق:', e)
                  exit(1)

          asyncio.run(main())
          "

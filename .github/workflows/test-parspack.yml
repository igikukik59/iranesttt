name: 🧪 تست آپلود مستقیم گیت‌هاب (Release API)

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write      # برای ساخت Release و آپلود asset لازمه
    steps:
      - name: 📥 دریافت کد
        uses: actions/checkout@v4

      - name: 🚀 تست ایجاد Release و آپلود فایل ۱۰MB
        run: |
          cat > test_upload.cjs << 'ENDSCRIPT'
          const { execSync } = require('child_process');
          const fs = require('fs');
          const path = require('path');

          // ========== تنظیمات ==========
          const GITHUB_TOKEN = process.env.GITHUB_TOKEN;   // توکن خودکار
          const REPO = process.env.GITHUB_REPOSITORY;      // "owner/repo"
          const API_BASE = 'https://api.github.com';
          const FILE_SIZE_MB = 10;

          // ========== ابزارهای کمکی ==========
          function log(...args) { console.log(`[${new Date().toISOString().substring(0,19)}]`, ...args); }

          async function apiRequest(method, url, data = null, extraHeaders = {}) {
            const headers = {
              'Authorization': `token ${GITHUB_TOKEN}`,
              'Accept': 'application/vnd.github.v3+json',
              ...extraHeaders
            };
            const options = { method, headers };
            if (data) {
              options.body = JSON.stringify(data);
              headers['Content-Type'] = 'application/json';
            }
            const res = await fetch(url, options);
            const status = res.status;
            const respData = await res.json().catch(() => ({}));
            if (status >= 400) {
              throw new Error(`GitHub API error (${status}): ${JSON.stringify(respData)}`);
            }
            return { status, data: respData, response: res };
          }

          // ========== ساخت فایل تصادفی ==========
          function createRandomFile(filePath, sizeMB) {
            const sizeBytes = sizeMB * 1024 * 1024;
            const chunk = Buffer.allocUnsafe(1024 * 1024); // 1MB buffer
            const fd = fs.openSync(filePath, 'w');
            for (let written = 0; written < sizeBytes; written += chunk.length) {
              // هر بار buffer رو با داده تصادفی پر کن
              for (let i = 0; i < chunk.length; i++) chunk[i] = Math.floor(Math.random() * 256);
              const toWrite = Math.min(chunk.length, sizeBytes - written);
              fs.writeSync(fd, chunk, 0, toWrite);
            }
            fs.closeSync(fd);
            log(`📁 فایل تصادفی ${sizeMB} مگابایتی ساخته شد: ${filePath}`);
          }

          // ========== اجرای اصلی ==========
          (async () => {
            if (!GITHUB_TOKEN) { log('❌ توکن گیت‌هاب یافت نشد.'); process.exit(1); }
            const [owner, repo] = REPO.split('/');

            // ۱. ساخت Release جدید
            const tag = `test-upload-${Date.now()}`;
            const releaseName = `🧪 تست آپلود مستقیم (${new Date().toISOString().substring(0,19)})`;
            log(`🏷️ ساختن Release با tag: ${tag}`);

            const createRes = await apiRequest('POST', `${API_BASE}/repos/${owner}/${repo}/releases`, {
              tag_name: tag,
              name: releaseName,
              body: 'این یک Release موقت برای تست لینک مستقیم است.',
              draft: false,
              prerelease: true
            });

            const releaseId = createRes.data.id;
            const uploadUrl = createRes.data.upload_url.replace('{?name,label}', '');
            log(`✅ Release ساخته شد (ID: ${releaseId})`);

            // ۲. ساخت فایل تصادفی ۱۰MB
            const testFile = '/tmp/test_10mb.bin';
            createRandomFile(testFile, FILE_SIZE_MB);

            // ۳. آپلود فایل به عنوان asset
            const assetName = 'test_10mb_random.bin';
            log(`📤 آپلود فایل ${assetName}...`);

            const stats = fs.statSync(testFile);
            const fileBuffer = fs.readFileSync(testFile);

            // آپلود asset (مطابق مستندات گیت‌هاب)
            const uploadHeaders = {
              'Content-Type': 'application/octet-stream',
            };
            const assetUrl = `${uploadUrl}?name=${encodeURIComponent(assetName)}`;
            const assetRes = await fetch(assetUrl, {
              method: 'POST',
              headers: {
                'Authorization': `token ${GITHUB_TOKEN}`,
                'Accept': 'application/vnd.github.v3+json',
                'Content-Type': 'application/octet-stream',
              },
              body: fileBuffer,
            });

            if (assetRes.status !== 201) {
              const errBody = await assetRes.text();
              throw new Error(`آپلود asset شکست خورد (${assetRes.status}): ${errBody}`);
            }

            const assetData = await assetRes.json();
            const downloadUrl = assetData.browser_download_url;

            log(`🎉 آپلود موفقیت‌آمیز!`);
            log(`🔗 لینک مستقیم دانلود: ${downloadUrl}`);
            console.log('\n==================================================');
            console.log('👇👇 روی این لینک کلیک کن / در مرورگر باز کن:');
            console.log(downloadUrl);
            console.log('==================================================\n');

            // ۴. (اختیاری) ذخیره اطلاعات برای حذف بعدی
            const info = {
              releaseId,
              assetId: assetData.id,
              downloadUrl,
              tag
            };
            fs.writeFileSync('/tmp/release_info.json', JSON.stringify(info, null, 2));
            log('📄 اطلاعات در /tmp/release_info.json ذخیره شد (برای حذف احتمالی)');
            log('⚠️ این Release به‌طور خودکار حذف نمی‌شود. می‌توانید بعداً دستی پاک کنید.');
          })().catch(err => {
            console.error('❌ خطا:', err);
            process.exit(1);
          });
          ENDSCRIPT

          node test_upload.cjs

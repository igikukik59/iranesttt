name: 🧪 تست اتصال سشن روبیکا

on:
  workflow_dispatch:

jobs:
  test-connection:
    runs-on: ubuntu-latest
    env:
      SESSION_B64: ${{ secrets.SESSION_DATA }}
      SESSION_NAME: my_account
      SESSION_FILE: my_account.rp

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 📦 نصب rubpy (همان نسخهٔ لوکال)
        run: pip install rubpy==7.3.5

      - name: 🔐 بازیابی فایل سشن از Secret
        run: echo "$SESSION_B64" | base64 -d > $SESSION_FILE

      - name: 📋 بررسی وجود فایل سشن
        run: ls -la $SESSION_FILE

      - name: 🔌 تست اتصال به روبیکا
        run: |
          python -c "
          import asyncio
          from rubpy import Client

          async def main():
              try:
                  async with Client(name='$SESSION_NAME') as app:
                      me = await app.get_me()
                      print('✅ اتصال موفقیت‌آمیز بود!')
                      print('شناسه کاربری:', me.user.user_guid)
                      print('نام:', me.user.first_name, me.user.last_name or '')
              except Exception as e:
                  print('❌ اتصال ناموفق:', e)
                  exit(1)

          asyncio.run(main())
          "

            "vless://6202b230-417c-4d8e-b624-0f71afa9c75d@162.55.187.121:8443?allowInsecure=1&encryption=none&host=sni.111000.indevs.in&security=tls&sni=sni.111000.indevs.in&type=ws",
            "vless://6202b230-417c-4d8e-b624-0f71afa9c75d@45.149.12.191:443?host=sni.my111000.tech&security=tls&sni=sni.my111000.tech&type=ws",
            "ss://Y2hhY2hhMjAtaWV0Zi1wb2x5MTMwNTpBUmd2R1p5d0ErZ2FjZ0dWMjZCdm11MDUrd1ptUlcvaitBZFUrWjhCdDQ0PQ==@173.234.29.2:990",
            "vless://6202b230-417c-4d8e-b624-0f71afa9c75d@91.193.58.112:443?allowInsecure=1&encryption=none&host=sni.111000.v6.rocks&security=tls&sni=sni.111000.v6.rocks&type=ws",
            "vless://6202b230-417c-4d8e-b624-0f71afa9c75d@135.84.67.21:443?allowInsecure=1&encryption=none&host=sni.111000.dynv6.net&security=tls&sni=sni.111000.dynv6.net&type=ws",
            "vless://388a6c57-87e7-420b-afe2-b3eb670fd7da@104.17.150.99:80?encryption=none&host=vip.yaml7.ggff.net&path=/&security=none&type=ws",
            "vless://6202b230-417c-4d8e-b624-0f71afa9c75d@8.6.112.0:8443?allowInsecure=1&encryption=none&host=sni.111000.dynv6.net&security=tls&sni=sni.111000.dynv6.net&type=ws",
            "vless://6202b230-417c-4d8e-b624-0f71afa9c75d@198.12.145.138:2096?allowInsecure=1&encryption=none&host=sni.111000.indevs.in&security=tls&sni=sni.111000.indevs.in&type=ws",
            "vless://6202b230-417c-4d8e-b624-0f71afa9c75d@57.128.177.206:443?allowInsecure=1&encryption=none&host=sni.111000.v6.navy&security=tls&sni=sni.111000.v6.navy&type=ws",
            "vless://ce069292-c8bf-40dd-a6b1-87818a1e64e9@104.18.40.152:443?allowInsecure=1&encryption=none&host=3-2h8.pages.dev&security=tls&sni=3-2h8.pages.dev&type=ws",
            "vless://6202b230-417c-4d8e-b624-0f71afa9c75d@64.188.93.158:443?encryption=none&security=tls&sni=sni.111000.v6.rocks&type=ws&host=sni.111000.v6.rocks&path="
          ];

          const proxies = PROXIES.filter(l => /^(vless|trojan|ss|vmess):\/\//.test(l));

          function ts() { return new Date().toISOString().replace('T',' ').substring(0,19); }
          function log(...args) { console.log(`[${ts()}]`, ...args); }
          function err(...args) { console.error(`[${ts()}] ❌`, ...args); }
          const sleep = ms => new Promise(r => setTimeout(r, ms));

          // ======================== Xray Helpers ========================
          function parseURI(uri) {
            try {
              const u = new URL(uri);
              return {
                protocol: u.protocol.replace(':',''),
                uuid: u.username,
                address: u.hostname,
                port: u.port,
                params: Object.fromEntries(u.searchParams.entries())
              };
            } catch(e) { return null; }
          }

          function generateXrayConfig(uri) {
            const p = parseURI(uri);
            if (!p) return null;
            const inbound = { port: 10808, protocol: 'socks', settings: { auth: 'noauth', udp: true } };
            let outbound = {
              protocol: p.protocol,
              settings: p.protocol === 'trojan' ? {
                servers: [{ address: p.address, port: parseInt(p.port), password: p.uuid }]
              } : {
                vnext: [{ address: p.address, port: parseInt(p.port), users: [{ id: p.uuid, encryption: p.params.encryption || 'none', flow: p.params.flow || '' }] }]
              },
              streamSettings: { network: p.params.type || 'tcp' }
            };
            const network = p.params.type || 'tcp';
            outbound.streamSettings.network = network;
            if (network === 'ws') {
              outbound.streamSettings.wsSettings = {
                path: p.params.path || '/',
                headers: p.params.host ? { Host: p.params.host } : {}
              };
            }
            const security = p.params.security || 'none';
            if (security === 'tls' || security === 'reality') {
              outbound.streamSettings.security = security;
              const tls = { serverName: p.params.sni || p.address };
              if (security === 'reality') {
                tls.fingerprint = p.params.fp || 'chrome';
                tls.publicKey = p.params.pbk || '';
                tls.shortId = p.params.sid || '';
                tls.spiderX = '';
              }
              if (p.params.allowInsecure === '1') tls.allowInsecure = true;
              if (p.params.alpn) tls.alpn = p.params.alpn.split(',');
              outbound.streamSettings.tlsSettings = tls;
            } else {
              outbound.streamSettings.security = 'none';
            }
            return { inbounds: [inbound], outbounds: [outbound] };
          }

          async function startXray(uri, idx) {
            const config = generateXrayConfig(uri);
            if (!config) return null;
            const cfgPath = `/tmp/xray_${idx}.json`;
            fs.writeFileSync(cfgPath, JSON.stringify(config, null, 2));
            const xray = spawn(XRAY_PATH, ['run', '-config', cfgPath], { stdio: 'pipe' });
            await new Promise(r => setTimeout(r, 4000));
            return xray;
          }

          function testCurl(port) {
            try {
              execSync(`curl --socks5 127.0.0.1:${port} --max-time 5 -s http://ip-api.com/json`, { encoding: 'utf8' });
              return true;
            } catch(e) { return false; }
          }

          // ======================== Rubika API ========================
          const TOKEN = process.env.RUBIKA_BOT_TOKEN;
          const OWNER = process.env.RUBIKA_OWNER_CHAT_ID || '';
          const BASE = `https://botapi.rubika.ir/v3/${TOKEN}`;

          async function api(method, body = {}, retries = 3) {
            const url = `${BASE}/${method}`;
            for (let attempt = 0; attempt < retries; attempt++) {
              try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 30000);
                const res = await fetch(url, {
                  method: 'POST',
                  headers: {'Content-Type':'application/json'},
                  body: JSON.stringify(body),
                  signal: controller.signal
                });
                clearTimeout(timeoutId);
                const text = await res.text();
                let data;
                try { data = JSON.parse(text); } catch(e) {
                  if (attempt < retries - 1) { await sleep(2000 * (attempt + 1)); continue; }
                  err(`⚠️ پاسخ ${method} JSON نیست:`, text.substring(0, 300));
                  return { error: true, raw: text };
                }
                return data;
              } catch(e) {
                if (attempt < retries - 1) {
                  log(`🔄 تلاش مجدد ${method} (${attempt+2}/${retries})...`);
                  await sleep(2000 * (attempt + 1));
                  continue;
                }
                err(`🚨 خطای شبکه در ${method}:`, e.message);
                return { error: true, message: e.message };
              }
            }
          }

          async function sendMessage(chatId, text, extra = {}) {
            return await api('sendMessage', { chat_id: chatId, text, ...extra });
          }

          async function updateKeyboard(chatId) {
            const keypad = buildControlKeypad();
            const res = await api('editChatKeypad', {
              chat_id: chatId,
              chat_keypad_type: "New",
              chat_keypad: keypad
            });
            if (res.error) err('خطا در به‌روزرسانی کیبورد:', res);
            else log('✅ کیبورد برای', chatId, 'تنظیم شد.');
          }

          // ======================== مدیریت مخازن موقت GitHub ========================
          const PAT_TOKEN = process.env.PAT_TOKEN;
          if (!PAT_TOKEN) { err('❌ PAT_TOKEN تنظیم نشده'); process.exit(1); }

          async function ghApi(url, options = {}) {
            const res = await fetch(url, {
              ...options,
              headers: {
                Authorization: `token ${PAT_TOKEN}`,
                'Content-Type': 'application/json',
                ...(options.headers || {})
              }
            });
            const data = await res.json().catch(() => ({}));
            if (!res.ok) throw new Error(`GitHub API (${res.status}): ${JSON.stringify(data)}`);
            return data;
          }

          async function deleteAllOrphanTempRepos() {
            log('🔍 جستجوی مخازن موقت باقی‌مانده...');
            try {
              const repos = await ghApi('https://api.github.com/user/repos?per_page=100');
              const orphan = repos.filter(r => r.name.startsWith('rb-temp-'));
              log(`📋 ${orphan.length} مخزن موقت پیدا شد.`);
              for (const repo of orphan) {
                log(`🗑️ حذف مخزن: ${repo.full_name}`);
                await ghApi(`https://api.github.com/repos/${repo.full_name}`, { method: 'DELETE' }).catch(() => {});
              }
            } catch(e) { err('خطا در پاکسازی مخازن قدیمی:', e.message); }
          }

          let tempRepo = null;
          let localRepoPath = '/tmp/current-temp-repo';
          let repoPushCount = 0;
          const MAX_FILES_IN_REPO = 80;

          async function createTempRepo() {
            const name = `rb-temp-${Date.now()}-${Math.floor(Math.random()*10000)}`;
            log(`📦 ساخت مخزن موقت: ${name}`);
            const data = await ghApi('https://api.github.com/user/repos', {
              method: 'POST',
              body: JSON.stringify({
                name,
                auto_init: false,
                private: false,
                description: 'Utility browser temp storage'
              })
            });
            log('✅ مخزن موقت ساخته شد:', data.full_name);
            return {
              owner: data.full_name.split('/')[0],
              repo: name,
              fullName: data.full_name,
              cloneUrl: data.clone_url
            };
          }

          async function deleteTempRepo(fullName) {
            log(`🗑️ حذف مخزن موقت: ${fullName}`);
            await ghApi(`https://api.github.com/repos/${fullName}`, { method: 'DELETE' }).catch(() => {});
          }

          function initLocalRepo() {
            if (fs.existsSync(localRepoPath)) fs.rmSync(localRepoPath, { recursive: true, force: true });
            fs.mkdirSync(localRepoPath, { recursive: true });
            process.chdir(localRepoPath);
            execSync('git init', {stdio:'pipe'});
            execSync('git checkout -b main', {stdio:'pipe'});
            execSync('git config user.name "browser-agent"', {stdio:'pipe'});
            execSync('git config user.email "agent@browser.tools"', {stdio:'pipe'});
            fs.writeFileSync('README.md', '# Browser Agent Temp Storage\n');
            execSync('git add README.md', {stdio:'pipe'});
            execSync('git commit -m "Init"', {stdio:'pipe'});
          }

          async function setupTempRepo() {
            if (!tempRepo) {
              tempRepo = await createTempRepo();
              initLocalRepo();
              const pushUrl = tempRepo.cloneUrl.replace('https://', `https://${PAT_TOKEN}@`);
              execSync(`git remote add origin ${pushUrl}`, {stdio:'pipe'});
              execSync('git push -u origin main', {stdio:'pipe'});
              repoPushCount = 0;
            }
          }

          async function uploadFileToTempRepo(localPath, remoteFolder, remoteFileName) {
            if (!tempRepo || repoPushCount >= MAX_FILES_IN_REPO) {
              if (tempRepo) {
                await deleteTempRepo(tempRepo.fullName);
                tempRepo = null;
                repoPushCount = 0;
              }
              await setupTempRepo();
            }

            const folderPath = path.join(localRepoPath, remoteFolder);
            if (!fs.existsSync(folderPath)) fs.mkdirSync(folderPath, { recursive: true });

            const dest = path.join(folderPath, remoteFileName);
            fs.copyFileSync(localPath, dest);

            execSync(`git add "${remoteFolder}/${remoteFileName}"`, {stdio:'pipe'});
            execSync(`git commit -m "Add ${remoteFolder}/${remoteFileName}"`, {stdio:'pipe'});

            try {
              execSync('git push', {stdio:'pipe'});
              log(`📤 فایل ${remoteFileName} push شد.`);
              repoPushCount++;
            } catch(pushErr) {
              const msg = pushErr.stderr ? pushErr.stderr.toString() : pushErr.message;
              if (msg.includes('Repository not found') || msg.includes('not found')) {
                log('⚠️ مخزن گم شد، بازسازی...');
                tempRepo = null;
                repoPushCount = 0;
                await setupTempRepo();
                return await uploadFileToTempRepo(localPath, remoteFolder, remoteFileName);
              } else throw pushErr;
            }

            const rawUrl = `https://raw.githubusercontent.com/${tempRepo.owner}/${tempRepo.repo}/main/${encodeURIComponent(remoteFolder)}/${encodeURIComponent(remoteFileName)}`;
            return rawUrl;
          }

          async function uploadFilesToTempRepo(filesArray, folderId) {
            const links = [];
            for (const f of filesArray) {
              const link = await uploadFileToTempRepo(f.localPath, folderId, f.fileName);
              links.push(link);
            }
            return links;
          }

          // ======================== تبدیل ویدیو ========================
          async function ensureCompatibleVideo(inputPath) {
            try {
              const probe = execSync(`ffprobe -v error -select_streams v:0 -show_entries stream=codec_name -of default=noprint_wrappers=1:nokey=1 "${inputPath}"`, { encoding: 'utf8' }).trim();
              if (probe === 'h264') {
                const audioProbe = execSync(`ffprobe -v error -select_streams a:0 -show_entries stream=codec_name -of default=noprint_wrappers=1:nokey=1 "${inputPath}"`, { encoding: 'utf8' }).trim();
                if (audioProbe === 'aac') {
                  log('ویدیو از قبل h264 + AAC است.');
                  return inputPath;
                }
              }
            } catch(e) {}

            log('ویدیو نیاز به تبدیل دارد...');
            const convertedPath = inputPath.replace(/\.\w+$/, '_converted.mp4');
            try {
              execSync(`ffmpeg -i "${inputPath}" -c:v libx264 -c:a aac -movflags +faststart "${convertedPath}"`, { stdio: 'inherit', timeout: 600000 });
              return convertedPath;
            } catch(e) {
              err('تبدیل با ffmpeg شکست:', e.message);
              return null;
            }
          }

          // ======================== تقسیم ویدیو ========================
          async function splitVideoSafe(inputPath, chunkDir, targetSizeMB = 80, maxSizeMB = 95) {
            const stats = fs.statSync(inputPath);
            const maxBytes = maxSizeMB * 1024 * 1024;
            if (stats.size <= maxBytes) {
              const dest = path.join(chunkDir, 'part_000.mp4');
              fs.copyFileSync(inputPath, dest);
              return [dest];
            }
            try {
              const dur = parseFloat(execSync(`ffprobe -v error -show_entries format=duration -of csv=p=0 "${inputPath}"`, {encoding:'utf8'}).trim());
              const br = parseFloat(execSync(`ffprobe -v error -show_entries format=bit_rate -of csv=p=0 "${inputPath}"`, {encoding:'utf8'}).trim());
              const segTime = Math.max(30, Math.floor((targetSizeMB * 8 * 1024 * 1024) / br));
              log(`🎯 تقسیم: bitrate ${(br/1000).toFixed(0)}kbps, قطعه‌های ${segTime}s`);
              const pattern = path.join(chunkDir, 'part_%03d.mp4');
              execSync(`ffmpeg -i "${inputPath}" -c copy -f segment -segment_time ${segTime} -reset_timestamps 1 "${pattern}"`, {stdio:'inherit', timeout:600000});
              let files = fs.readdirSync(chunkDir).filter(f => f.endsWith('.mp4')).sort();
              for (const fname of files) {
                const fpath = path.join(chunkDir, fname);
                if (fs.statSync(fpath).size > maxBytes) {
                  log(`⚠️ قطعه ${fname} بزرگتر از حد مجاز، تقسیم مجدد...`);
                  const subDur = parseFloat(execSync(`ffprobe -v error -show_entries format=duration -of csv=p=0 "${fpath}"`, {encoding:'utf8'}).trim());
                  const half = Math.floor(subDur / 2);
                  const subDir = path.join(chunkDir, `sub_${Date.now()}`);
                  fs.mkdirSync(subDir, { recursive: true });
                  execSync(`ffmpeg -i "${fpath}" -c copy -f segment -segment_time ${half} -reset_timestamps 1 "${subDir}/sub_%03d.mp4"`, {stdio:'inherit', timeout:600000});
                  const subChunks = fs.readdirSync(subDir).filter(f => f.endsWith('.mp4')).sort();
                  const baseNum = parseInt(fname.match(/\d+/)[0]) * 100;
                  for (let i = 0; i < subChunks.length; i++) {
                    const newName = `part_${baseNum + i}_r.mp4`;
                    fs.renameSync(path.join(subDir, subChunks[i]), path.join(chunkDir, newName));
                  }
                  fs.rmSync(subDir, { recursive: true });
                  fs.unlinkSync(fpath);
                }
              }
              files = fs.readdirSync(chunkDir).filter(f => f.endsWith('.mp4')).sort();
              return files.map(f => path.join(chunkDir, f));
            } catch(e) {
              err('تقسیم ویدیو شکست:', e.message);
              return [];
            }
          }


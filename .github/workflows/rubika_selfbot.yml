          // ======================== استخراج متن ========================
          async function extractVisibleText(page) {
            return await page.evaluate(() => {
              const walker = document.createTreeWalker(
                document.body,
                NodeFilter.SHOW_TEXT,
                null,
                false
              );
              const lines = [];
              let node;
              while (node = walker.nextNode()) {
                let text = node.textContent.trim();
                if (!text) continue;
                const parent = node.parentElement;
                if (!parent) continue;
                const style = window.getComputedStyle(parent);
                if (style.display === 'none' || style.visibility === 'hidden') continue;
                const tag = parent.tagName.toLowerCase();
                let prefix = '';
                if (tag === 'h1') prefix = '# ';
                else if (tag === 'h2') prefix = '## ';
                else if (tag === 'h3') prefix = '### ';
                else if (tag === 'h4') prefix = '#### ';
                else if (tag === 'h5') prefix = '##### ';
                else if (tag === 'h6') prefix = '###### ';
                if (parent.tagName === 'STRONG' || parent.tagName === 'B') text = `**${text}**`;
                if (parent.tagName === 'EM' || parent.tagName === 'I') text = `*${text}*`;
                lines.push(prefix + text);
              }
              return lines.join('\n').substring(0, 4000);
            });
          }

          // ======================== دانلودها ========================
          function runSpawn(cmd, args, options = {}) {
            log(`▶️ اجرا: ${cmd} ${args.join(' ')}`);
            const proc = spawnSync(cmd, args, {
              stdio: ['pipe', 'pipe', 'pipe'],
              timeout: options.timeout || 300000,
              encoding: 'utf8',
              ...options
            });
            if (proc.status !== 0) {
              const errMsg = proc.stderr?.toString() || proc.error?.message || '';
              log(`🔴 خطا: ${errMsg.substring(0, 500)}`);
              return { success: false, error: errMsg };
            }
            log('🟢 موفق');
            return { success: true, stdout: proc.stdout?.toString() };
          }

          async function downloadImage(url, referer) {
            const dir = '/tmp/downloaded_images';
            if (!fs.existsSync(dir)) fs.mkdirSync(dir, { recursive: true });
            const outName = `img_${Date.now()}_${path.basename(new URL(url).pathname) || 'image.jpg'}`;
            const outPath = path.join(dir, outName);
            const args = [
              '--socks5-proxy=127.0.0.1:10808',
              '--check-certificate=false',
              '-x16', '-s16', '-k1M',
              `--user-agent=Mozilla/5.0`,
              `--referer=${referer}`,
              `--dir=${dir}`,
              `--out=${outName}`,
              url
            ];
            const res = runSpawn('aria2c', args);
            return res.success ? { ok: true, path: outPath } : { ok: false };
          }

          async function downloadFile(url, referer) {
            const dir = '/tmp/downloaded_files';
            if (!fs.existsSync(dir)) fs.mkdirSync(dir, { recursive: true });
            const outName = path.basename(new URL(url).pathname) || `file_${Date.now()}`;
            const outPath = path.join(dir, outName);
            const args = [
              '--socks5-proxy=127.0.0.1:10808',
              '--check-certificate=false',
              '-x16', '-s16', '-k1M',
              `--user-agent=Mozilla/5.0`,
              `--referer=${referer}`,
              `--dir=${dir}`,
              `--out=${outName}`,
              url
            ];
            const res = runSpawn('aria2c', args, { timeout: 120000 });
            return res.success ? { ok: true, path: outPath } : { ok: false };
          }

          async function downloadVideo(url, type, referer, platform, pageUrl) {
            const downloadDir = `/tmp/video_dl_${Date.now()}`;
            fs.mkdirSync(downloadDir, { recursive: true });
            log(`📂 پوشه دانلود: ${downloadDir}`);

            // --- متدهای کمکی برای yt‑dlp (در صورت نیاز) ---
            const runYtDlp = (outPattern, targetUrl) => {
              const args = [
                '--no-playlist',
                '--max-downloads', '1',
                '--merge-output-format', 'mp4',
                '--force-ipv4',
                '--user-agent', 'Mozilla/5.0 (Windows NT 10.0; Win64; x64)',
                '--extractor-args', 'youtube:player_client=android_vr',
                '--proxy', 'socks5://127.0.0.1:10808',
                '-o', outPattern
              ];
              return runSpawn('yt-dlp', [...args, targetUrl]);
            };

            const finalizeYtDlp = (stdout, downloadDir) => {
              const files = fs.readdirSync(downloadDir).filter(f => f.endsWith('.mp4') || f.endsWith('.mkv') || f.endsWith('.webm'));
              if (files.length === 0) return { ok: false, error: 'No output file', downloadDir };
              const targetFile = files.sort((a,b) => fs.statSync(path.join(downloadDir,b)).size - fs.statSync(path.join(downloadDir,a)).size)[0];
              return { ok: true, path: path.join(downloadDir, targetFile), downloadDir };
            };

            // --- blob: مستقیم به yt‑dlp با pageUrl ---
            if (type === 'direct' && url.startsWith('blob:')) {
              const outPattern = path.join(downloadDir, '%(title).200s_%(id)s.%(ext)s');
              const res = runYtDlp(outPattern, pageUrl);
              return res.success ? finalizeYtDlp(res.stdout, downloadDir) : { ok: false, error: res.error, downloadDir };
            }

            // --- لینک مستقیم (غیر blob) – تلاش با curl ---
            if (type === 'direct') {
              const outName = `video_${Date.now()}_${path.basename(new URL(url).pathname) || 'video.mp4'}`;
              const outPath = path.join(downloadDir, outName);
              log(`🔄 تلاش دانلود مستقیم با curl: ${url}`);
              try {
                execSync(
                  `curl --socks5 127.0.0.1:10808 -L -e "${referer}" -A "Mozilla/5.0" -o "${outPath}" "${url}"`,
                  { stdio: 'inherit', timeout: 600000 }
                );
                if (fs.existsSync(outPath) && fs.statSync(outPath).size > 1024) {
                  log('✅ curl موفق');
                  return { ok: true, path: outPath, downloadDir };
                } else {
                  throw new Error('curl output too small');
                }
              } catch(curlErr) {
                err('curl شکست، تلاش با yt‑dlp روی صفحه:', curlErr.message);
                // تمیز کردن فایل ناقص
                try { fs.unlinkSync(outPath); } catch(_) {}
                const outPattern = path.join(downloadDir, '%(title).200s_%(id)s.%(ext)s');
                const ytRes = runYtDlp(outPattern, pageUrl);
                return ytRes.success ? finalizeYtDlp(ytRes.stdout, downloadDir) : { ok: false, error: 'curl & yt-dlp both failed: ' + (ytRes.error || ''), downloadDir };
              }
            }

            // --- embed (همان yt‑dlp با url) ---
            if (type === 'embed') {
              const outPattern = path.join(downloadDir, '%(title).200s_%(id)s.%(ext)s');
              const res = runYtDlp(outPattern, url);
              return res.success ? finalizeYtDlp(res.stdout, downloadDir) : { ok: false, error: res.error, downloadDir };
            }

            return { ok: false, error: 'نوع ناشناخته', downloadDir };
          }

          // ======================== اسکرین‌شات و PDF ========================
          async function takeFullPageScreenshot(page) {
            const shotPath = `/tmp/fullshot_${Date.now()}.png`;
            await page.screenshot({ path: shotPath, fullPage: true });
            return shotPath;
          }

          async function savePdf(page) {
            const pdfPath = `/tmp/page_${Date.now()}.pdf`;
            await page.pdf({ path: pdfPath, format: 'A4', printBackground: true });
            return pdfPath;
          }

          async function zoomPage(page, zoomIn = true) {
            const currentZoom = await page.evaluate(() => parseFloat(getComputedStyle(document.body).zoom || '1.0'));
            let newZoom = zoomIn ? Math.min(currentZoom + 0.1, 3.0) : Math.max(currentZoom - 0.1, 0.3);
            await page.evaluate((z) => { document.body.style.zoom = z; }, newZoom.toString());
            return newZoom;
          }

          // ======================== مدیریت حالت ========================
          const chatStates = new Map();
          function getState(chatId) {
            if (!chatStates.has(chatId)) {
              chatStates.set(chatId, {
                typingMode: false,
                urlMode: false,
                scrollMultiMode: false,
                scrollDirection: null,
                scrollAreasCount: 0,
                scrollSelectedIndex: null,
                selectionMode: false,
                videoMode: false,
                videoData: null,
                pageUrlAtVideo: '',
                imageMode: false,
                imageData: null,
                pageUrlAtImage: '',
                fileMode: false,
                fileData: null,
                pageUrlAtFile: '',
                zoomLevel: 1.0
              });
            }
            return chatStates.get(chatId);
          }

          function resetAllStates(state) {
            Object.assign(state, {
              typingMode: false,
              urlMode: false,
              scrollMultiMode: false,
              scrollDirection: null,
              scrollAreasCount: 0,
              scrollSelectedIndex: null,
              selectionMode: false,
              videoMode: false,
              videoData: null,
              pageUrlAtVideo: '',
              imageMode: false,
              imageData: null,
              pageUrlAtImage: '',
              fileMode: false,
              fileData: null,
              pageUrlAtFile: ''
            });
          }

          async function sendScreenshotLink(page, chatId, fullPage = false) {
            const shotPath = fullPage ? await takeFullPageScreenshot(page) : `/tmp/shot_${chatId}_${Date.now()}.png`;
            if (!fullPage) await page.screenshot({ path: shotPath, fullPage: false });
            const fileName = `screenshot_${Date.now()}.png`;
            const link = await uploadFileToTempRepo(shotPath, 'screenshots', fileName);
            await sendMessage(chatId, `📸 اسکرین‌شات:\n${link}`);
            try { fs.unlinkSync(shotPath); } catch(_) {}
            return link;
          }

          async function sendPdfLink(page, chatId) {
            const pdfPath = await savePdf(page);
            const fileName = `page_${Date.now()}.pdf`;
            const link = await uploadFileToTempRepo(pdfPath, 'pdfs', fileName);
            await sendMessage(chatId, `📄 PDF:\n${link}`);
            try { fs.unlinkSync(pdfPath); } catch(_) {}
            return link;
          }

          // ======================== پردازش دکمه‌ها ========================
          async function handleButton(page, chatId, buttonId, browserManager) {
            const state = getState(chatId);
            resetAllStates(state);

            switch(buttonId) {
              case 'SCROLL_UP':
              case 'SCROLL_DOWN':
                state.scrollMultiMode = true;
                state.scrollDirection = buttonId === 'SCROLL_UP' ? 'up' : 'down';
                const cnt = await highlightScrollableAreas(page);
                state.scrollAreasCount = cnt;
                if (cnt === 0) {
                  await sendMessage(chatId, '⚠️ هیچ ناحیه اسکرولی یافت نشد.');
                  state.scrollMultiMode = false;
                  await sendScreenshotLink(page, chatId);
                } else {
                  await sendScreenshotLink(page, chatId);
                  await sendMessage(chatId, `🟢 ${cnt} ناحیه اسکرول (سبز) نشانه‌گذاری شد.\nشماره ناحیه را وارد کنید.`);
                }
                break;
              case 'TYPE':
                state.typingMode = true;
                await sendMessage(chatId, '⌨️ متن را ارسال کنید:');
                break;
              case 'GO_URL':
                state.urlMode = true;
                await sendMessage(chatId, '🌐 آدرس کامل را ارسال کنید:');
                break;
              case 'SELECT':
                state.selectionMode = true;
                const selCnt = await highlightClickableElements(page);
                if (selCnt === 0) {
                  await sendMessage(chatId, '⚠️ هیچ عنصری یافت نشد.');
                  state.selectionMode = false;
                  await sendScreenshotLink(page, chatId);
                } else {
                  await sendScreenshotLink(page, chatId);
                  await sendMessage(chatId, `🔢 ${selCnt} عنصر نشانه‌گذاری شد. شماره را وارد کنید.`);
                }
                break;
              case 'EXTRACT_TEXT':
                try {
                  const text = await extractVisibleText(page);
                  await sendMessage(chatId, `📋 متن صفحه:\n${text}`);
                } catch(e) {
                  err('خطا استخراج متن:', e.message);
                  await sendMessage(chatId, '❌ خطا در استخراج متن.');
                }
                await sendScreenshotLink(page, chatId);
                break;
              case 'VIDEOS':
                state.videoMode = true;
                const { videos, pageUrl } = await highlightVideoElements(page);
                state.videoData = videos;
                state.pageUrlAtVideo = pageUrl;
                if (videos.length === 0) {
                  await sendMessage(chatId, '❌ هیچ ویدیویی پیدا نشد.');
                  state.videoMode = false;
                  await sendScreenshotLink(page, chatId);
                } else {
                  await sendScreenshotLink(page, chatId);
                  await sendMessage(chatId, `🎥 ${videos.length} ویدیو (آبی) نشانه‌گذاری شد.\nشماره مورد نظر را بفرستید.`);
                }
                break;
              case 'IMAGES':
                state.imageMode = true;
                const { images, pageUrl: imgPageUrl } = await highlightImages(page);
                state.imageData = images;
                state.pageUrlAtImage = imgPageUrl;
                if (images.length === 0) {
                  await sendMessage(chatId, '❌ هیچ تصویری پیدا نشد.');
                  state.imageMode = false;
                  await sendScreenshotLink(page, chatId);
                } else {
                  await sendScreenshotLink(page, chatId);
                  await sendMessage(chatId, `🖼️ ${images.length} تصویر (نارنجی) نشانه‌گذاری شد.\nشماره مورد نظر را بفرستید.`);
                }
                break;
              case 'FILES':
                state.fileMode = true;
                const { files, pageUrl: filePageUrl } = await highlightFiles(page);
                state.fileData = files;
                state.pageUrlAtFile = filePageUrl;
                if (files.length === 0) {
                  await sendMessage(chatId, '❌ هیچ فایلی پیدا نشد.');
                  state.fileMode = false;
                  await sendScreenshotLink(page, chatId);
                } else {
                  await sendScreenshotLink(page, chatId);
                  await sendMessage(chatId, `📁 ${files.length} فایل (بنفش) نشانه‌گذاری شد.\nشماره مورد نظر را بفرستید.`);
                }
                break;
              case 'FULL_SCREENSHOT':
                await sendScreenshotLink(page, chatId, true);
                break;
              case 'SAVE_PDF':
                await sendPdfLink(page, chatId);
                break;
              case 'PAGE_LINK':
                const currentUrl = page.url();
                await sendMessage(chatId, `🔗 آدرس صفحه:\n${currentUrl}`);
                await sendScreenshotLink(page, chatId);
                break;
              case 'ENTER':
                try {
                  const navP = page.waitForNavigation({ waitUntil: 'networkidle2', timeout: 5000 }).catch(() => null);
                  await page.keyboard.press('Enter');
                  await navP;
                  await sleep(1000);
                } catch(e) { log('⚠️ مدیریت ناوبری Enter'); await sleep(1500); }
                break;
              case 'ZOOM_IN': {
                const z = await zoomPage(page, true);
                state.zoomLevel = z;
                await sendMessage(chatId, `🔍 زوم ${z.toFixed(1)}x`);
                break;
              }
              case 'ZOOM_OUT': {
                const z = await zoomPage(page, false);
                state.zoomLevel = z;
                await sendMessage(chatId, `🔍 زوم ${z.toFixed(1)}x`);
                break;
              }
              case 'SCREENSHOT': break;
              case 'REFRESH':
                try {
                  await page.reload({ waitUntil: 'networkidle2', timeout: 30000 });
                  await sleep(1000);
                  await page.evaluate((zo) => { document.body.style.zoom = zo; }, state.zoomLevel.toString());
                } catch(e) { err('رفرش خطا:', e.message); await sendMessage(chatId, '❌ رفرش با مشکل مواجه شد.'); }
                break;
              case 'GO_BACK':
                try {
                  await page.goBack({ waitUntil: 'networkidle2', timeout: 15000 });
                  await sleep(1000);
                  await sendMessage(chatId, '🠔 به صفحه قبل بازگشتیم.');
                } catch(e) { err('بازگشت خطا:', e.message); await sendMessage(chatId, '❌ امکان بازگشت وجود ندارد.'); }
                break;
              case 'CHANGE_PROXY': {
                const switched = await browserManager.switchProxy();
                if (switched) {
                  await sendMessage(chatId, '🔁 پروکسی تغییر کرد.');
                } else {
                  await sendMessage(chatId, '❌ هیچ پروکسی سالمی یافت نشد.');
                  process.exit(1);
                }
                await updateKeyboard(chatId);
                return;
              }
              case 'HELP':
                await sendMessage(chatId, '🎮 راهنما:\n⬆️⬇️ اسکرول هوشمند\n⌨️ تایپ\n🌐 آدرس جدید\n🔍 انتخاب با شماره\n📋 متن قابل مشاهده\n🎥 ویدیوها\n🖼️ تصاویر\n📁 فایل‌ها\n🖼️ اسکرین‌شات کامل\n📄 PDF\n🔗 لینک صفحه\n🔍 زوم +/-\n📸 اسکرین‌شات\n↵ Enter\n🔄 رفرش\n🠔 عقب\n🔁 پروکسی\n✖️ لغو');
                await sendScreenshotLink(page, chatId);
                break;
              case 'CANCEL':
                resetAllStates(state);
                await sendMessage(chatId, '✖️ تمام عملیات‌های در حال اجرا لغو شد.');
                await sendScreenshotLink(page, chatId);
                break;
              default:
                await sendScreenshotLink(page, chatId);
            }
            await updateKeyboard(chatId);
          }

          // ======================== پردازش ورودی متنی ========================
          async function handleTextInput(page, chatId, text) {
            const state = getState(chatId);

            if (state.scrollMultiMode) {
              if (state.scrollSelectedIndex === null) {
                const idx = parseInt(text);
                if (isNaN(idx) || idx < 1 || idx > state.scrollAreasCount) {
                  await sendMessage(chatId, `❌ شماره بین ۱ تا ${state.scrollAreasCount} وارد کنید.`);
                  await updateKeyboard(chatId);
                  return;
                }
                state.scrollSelectedIndex = idx;
                await removeScrollHighlights(page);
                const dirText = state.scrollDirection === 'up' ? 'بالا' : 'پایین';
                await sendMessage(chatId, `✅ ناحیه ${idx} انتخاب شد.\nچند پیکسل به ${dirText} اسکرول کنم؟`);
                await updateKeyboard(chatId);
                return;
              } else {
                const px = parseInt(text);
                if (isNaN(px) || px <= 0) {
                  await sendMessage(chatId, '❌ عدد مثبت وارد کنید.');
                  await updateKeyboard(chatId);
                  return;
                }
                await scrollAreaByPixel(page, state.scrollSelectedIndex, px, state.scrollDirection);
                await sleep(300);
                resetAllStates(state);
                await sendScreenshotLink(page, chatId);
                await updateKeyboard(chatId);
                return;
              }
            }

            if (state.typingMode) {
              state.typingMode = false;
              if (text) {
                await page.keyboard.type(text, { delay: 50 });
                await sleep(300);
              }
              await sendScreenshotLink(page, chatId);
              await updateKeyboard(chatId);
              return;
            }

            if (state.urlMode) {
              state.urlMode = false;
              if (text) {
                try {
                  await page.goto(text, { waitUntil: 'networkidle2', timeout: 30000 });
                  await sleep(2000);
                  await page.evaluate((zo) => { document.body.style.zoom = zo; }, state.zoomLevel.toString());
                } catch(e) { err('بارگذاری ناموفق:', e.message); await sendMessage(chatId, '❌ خطا در باز کردن آدرس.'); }
              }
              await sendScreenshotLink(page, chatId);
              await updateKeyboard(chatId);
              return;
            }

            if (state.selectionMode) {
              const num = parseInt(text);
              if (isNaN(num) || num <= 0) { 
                await sendMessage(chatId, '❌ عدد معتبر وارد کنید.'); 
                await updateKeyboard(chatId);
                return; 
              }
              const ok = await clickByNumber(page, num);
              if (!ok) await sendMessage(chatId, `❌ کلیک روی عنصر ${num} ناموفق بود.`);
              await removeHighlights(page);
              state.selectionMode = false;
              await sleep(300);
              await sendScreenshotLink(page, chatId);
              await updateKeyboard(chatId);
              return;
            }

            if (state.videoMode) {
              const num = parseInt(text);
              if (isNaN(num) || num < 1 || num > state.videoData.length) {
                await sendMessage(chatId, '❌ شماره نامعتبر.');
                await updateKeyboard(chatId);
                return;
              }
              const sel = state.videoData[num-1];
              await sendMessage(chatId, `📥 در حال دانلود ویدیوی شماره ${num} ...`);
              log(`🎬 دانلود ویدیو #${num}: ${sel.src}`);
              const res = await downloadVideo(sel.src, sel.type, state.pageUrlAtVideo, sel.platform, state.pageUrlAtVideo);
              if (res.ok) {
                log('📦 دانلود موفق، تبدیل و تقسیم...');
                const compatiblePath = await ensureCompatibleVideo(res.path);
                if (!compatiblePath) {
                  await sendMessage(chatId, '❌ تبدیل ویدیو به فرمت سازگار ممکن نشد.');
                  await removeVideoHighlights(page);
                  resetAllStates(state);
                  try { fs.rmSync(res.downloadDir, { recursive: true }); } catch(_) {}
                  await updateKeyboard(chatId);
                  return;
                }
                const chunkDir = `/tmp/video_chunks_${Date.now()}`;
                fs.mkdirSync(chunkDir, { recursive: true });
                const chunks = await splitVideoSafe(compatiblePath, chunkDir);
                if (chunks.length === 0) {
                  await sendMessage(chatId, '❌ خطا در تقسیم ویدیو.');
                } else {
                  const folderId = `video_${Date.now()}`;
                  const filesList = chunks.map(p => ({ localPath: p, fileName: path.basename(p) }));
                  const links = await uploadFilesToTempRepo(filesList, folderId);
                  let msg = `🎬 ${path.basename(compatiblePath, path.extname(compatiblePath))} (${chunks.length} قطعه)\n\n📥 لینک‌های دانلود:\n`;
                  links.forEach((l, i) => msg += `${i+1}. ${l}\n`);
                  await sendMessage(chatId, msg);
                }
                try { fs.rmSync(res.downloadDir, { recursive: true }); } catch(_) {}
                for (const c of chunks) try { fs.unlinkSync(c); } catch(_) {}
                try { fs.rmSync(chunkDir, { recursive: true }); } catch(_) {}
                if (compatiblePath !== res.path) try { fs.unlinkSync(compatiblePath); } catch(_) {}
              } else {
                log('❌ دانلود ویدیو ناموفق.');
                const errMsg = res.error ? `\nخطا: ${res.error.substring(0, 500)}` : '';
                await sendMessage(chatId, `❌ دانلود ویدیو ناموفق.${errMsg}`);
                try { fs.rmSync(res.downloadDir, { recursive: true }); } catch(_) {}
              }
              await removeVideoHighlights(page);
              resetAllStates(state);
              await sleep(300);
              await sendScreenshotLink(page, chatId);
              await updateKeyboard(chatId);
              return;
            }

            if (state.imageMode) {
              const num = parseInt(text);
              if (isNaN(num) || num < 1 || num > state.imageData.length) {
                await sendMessage(chatId, '❌ شماره نامعتبر.');
                await updateKeyboard(chatId);
                return;
              }
              const url = state.imageData[num-1];
              await sendMessage(chatId, `📥 دانلود تصویر شماره ${num} ...`);
              const res = await downloadImage(url, state.pageUrlAtImage);
              if (res.ok) {
                const imgName = path.basename(res.path);
                const link = await uploadFileToTempRepo(res.path, 'images', imgName);
                await sendMessage(chatId, `🖼️ تصویر:\n${link}`);
                try { fs.unlinkSync(res.path); } catch(_) {}
              } else {
                await sendMessage(chatId, '❌ دانلود تصویر ناموفق.');
              }
              await removeImageHighlights(page);
              resetAllStates(state);
              await sleep(300);
              await sendScreenshotLink(page, chatId);
              await updateKeyboard(chatId);
              return;
            }

            if (state.fileMode) {
              const num = parseInt(text);
              if (isNaN(num) || num < 1 || num > state.fileData.length) {
                await sendMessage(chatId, '❌ شماره نامعتبر.');
                await updateKeyboard(chatId);
                return;
              }
              const url = state.fileData[num-1].src;
              await sendMessage(chatId, `📥 دانلود فایل شماره ${num} ...`);
              const res = await downloadFile(url, state.pageUrlAtFile);
              if (res.ok) {
                const fileName = path.basename(res.path);
                const link = await uploadFileToTempRepo(res.path, 'files', fileName);
                await sendMessage(chatId, `📁 فایل:\n${link}`);
                try { fs.unlinkSync(res.path); } catch(_) {}
              } else {
                await sendMessage(chatId, '❌ دانلود فایل ناموفق.');
              }
              await removeFileHighlights(page);
              resetAllStates(state);
              await sleep(300);
              await sendScreenshotLink(page, chatId);
              await updateKeyboard(chatId);
              return;
            }

            if (text === '/start') {
              await sendMessage(chatId, '🟢 ربات آماده.');
              await sendScreenshotLink(page, chatId);
            } else if (text === 'help') {
              await sendMessage(chatId, '🎮 دکمه‌ها:\n⬆️⬇️ اسکرول\n⌨️ تایپ\n🌐 آدرس جدید\n🔍 انتخاب با شماره\n📋 متن\n🎥 ویدیوها\n🖼️ تصاویر\n📁 فایل‌ها\n🖼️ اسکرین‌شات کامل\n📄 PDF\n🔗 لینک صفحه\n🔍 زوم\n📸 اسکرین‌شات\n↵ Enter\n🔄 رفرش\n🠔 عقب\n🔁 پروکسی\n✖️ لغو');
            }
            await updateKeyboard(chatId);
          }

          // ======================== مدیریت پروکسی و مرورگر ========================
          class BrowserManager {
            constructor(proxies) {
              this.proxies = proxies;
              this.browser = null;
              this.page = null;
              this.xrayProc = null;
              this.currentProxyIndex = -1;
            }
            async startBrowserWithProxy(index) {
              if (this.xrayProc) { this.xrayProc.kill(); await sleep(500); }
              if (this.browser) { try { await this.browser.close(); } catch(_) {} }

              const uri = this.proxies[index];
              log(`🔌 تست پروکسی ${index+1}/${this.proxies.length}: ${uri.substring(0,60)}...`);
              this.xrayProc = await startXray(uri, index);
              if (!this.xrayProc) throw new Error('Xray start failed');
              if (!testCurl(10808)) throw new Error('Curl failed');

              this.browser = await puppeteer.launch({
                headless: 'new',
                args: [
                  '--no-sandbox','--disable-setuid-sandbox',
                  '--proxy-server=socks5://127.0.0.1:10808',
                  '--disable-dev-shm-usage','--window-size=1280,720'
                ],
                defaultViewport: null
              });
              this.page = await this.browser.newPage();
              await this.page.setViewport({ width: 1280, height: 720, deviceScaleFactor: 1 });
              await this.page.setUserAgent('Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/125.0.0.0');
              await this.page.evaluate(() => { document.body.style.zoom = '1.0'; });
            }
            async findWorkingProxy() {
              for (let i = 0; i < this.proxies.length; i++) {
                try {
                  await this.startBrowserWithProxy(i);
                  await this.page.goto(TARGET_URL, { waitUntil: 'networkidle2', timeout: 30000 });
                  await sleep(2000);
                  const blocked = await this.page.evaluate(() => {
                    const bodyText = document.body.innerText.toLowerCase();
                    return ['access denied', 'you have been blocked', 'cloudflare', 'attention required'].some(t => bodyText.includes(t));
                  });
                  if (blocked) { log('⛔ پروکسی بلاک دارد.'); continue; }
                  this.currentProxyIndex = i;
                  log('✅ اتصال موفق.');
                  return true;
                } catch(e) { err('خطا در تست پروکسی:', e.message); }
              }
              return false;
            }
            async switchProxy() {
              let newIdx = (this.currentProxyIndex + 1) % this.proxies.length;
              for (let i = 0; i < this.proxies.length; i++) {
                try {
                  await this.startBrowserWithProxy(newIdx);
                  await this.page.goto(TARGET_URL, { waitUntil: 'networkidle2', timeout: 30000 });
                  await sleep(2000);
                  const blocked = await this.page.evaluate(() => {
                    const bodyText = document.body.innerText.toLowerCase();
                    return ['access denied', 'you have been blocked', 'cloudflare', 'attention required'].some(t => bodyText.includes(t));
                  });
                  if (blocked) { log('پروکسی جدید بلاک دارد.'); newIdx = (newIdx + 1) % this.proxies.length; continue; }
                  this.currentProxyIndex = newIdx;
                  log(`✅ پروکسی به ${newIdx+1} تغییر کرد.`);
                  if (OWNER) await sendScreenshotLink(this.page, OWNER);
                  return true;
                } catch(e) { log('خطا با پروکسی:', e.message); newIdx = (newIdx + 1) % this.proxies.length; }
              }
              return false;
            }
          }

          // ======================== اجرای اصلی ========================
          (async () => {
            try {
              const me = await api('getMe');
              const bot = me?.data?.bot;
              if (!bot?.username) { err('توکن نامعتبر'); process.exit(1); }
              log('✅ ربات:', bot.username);

              await deleteAllOrphanTempRepos();
              await setupTempRepo();

              log(`${proxies.length} کانفیگ خوب.`);

              const browserManager = new BrowserManager(proxies);
              const found = await browserManager.findWorkingProxy();
              if (!found) { err('هیچ پروکسی سالمی یافت نشد.'); process.exit(1); }

              let page = browserManager.page;
              if (OWNER) {
                await sendMessage(OWNER, '🟢 ربات روشن شد.');
                await updateKeyboard(OWNER);
              } else log('⚠️ OWNER_CHAT_ID تنظیم نشده.');

              log('🧹 پاک‌سازی تاریخچه...');
              let offset = null, flushed = 0;
              while (true) {
                const params = { limit: 10 };
                if (offset !== null) params.offset_id = offset;
                const upRes = await api('getUpdates', params);
                if (upRes.error) break;
                const updates = upRes?.data?.updates;
                if (!updates || updates.length === 0) break;
                flushed += updates.length;
                if (upRes.data?.next_offset_id) offset = upRes.data.next_offset_id;
                else break;
              }
              log(`✅ تاریخچه پاک (${flushed} آپدیت). offset: ${offset || 'ندارد'}`);

              if (OWNER) await sendScreenshotLink(page, OWNER);

              const cleanupInterval = setInterval(() => {
                log('🧹 پاکسازی خودکار فایل‌های موقت...');
                execSync('rm -rf /tmp/downloaded_* /tmp/video_chunks_* /tmp/video_dl_* /tmp/xray_*.json /tmp/shot_* /tmp/sel_* /tmp/vid_* /tmp/img_* /tmp/scroll_* /tmp/fullshot_* /tmp/page_* 2>/dev/null');
                execSync('rm -rf /tmp/.org.chromium.Chromium.* /tmp/.X11-unix 2>/dev/null');
              }, 30 * 60 * 1000);

              let consecutiveErrors = 0;
              const END_TIME = Date.now() + 17380 * 1000;

              while (Date.now() < END_TIME) {
                try {
                  const params = { limit: 10 };
                  if (offset !== null) params.offset_id = offset;
                  const upRes = await api('getUpdates', params);
                  if (upRes.error) {
                    consecutiveErrors++;
                    if (consecutiveErrors >= 3) { offset = null; consecutiveErrors = 0; }
                    await sleep(5000);
                    continue;
                  }
                  consecutiveErrors = 0;
                  const updates = upRes?.data?.updates;

                  if (updates?.length) {
                    for (const upd of updates) {
                      if (upd.type !== 'NewMessage') continue;
                      const chatId = upd.chat_id;
                      const msg = upd.new_message;
                      if (!msg) continue;

                      const buttonId = msg.aux_data?.button_id;
                      const text = (msg.text || '').trim();

                      try {
                        if (buttonId) {
                          log(`🔘 دکمه ${buttonId} از ${chatId}`);
                          await handleButton(page, chatId, buttonId, browserManager);
                        } else {
                          await handleTextInput(page, chatId, text);
                        }
                      } catch(handlerError) {
                        err('خطا در پردازش:', handlerError.message);
                        const st = getState(chatId);
                        resetAllStates(st);
                        await sendMessage(chatId, '⚠️ خطا. حالت‌ها ریست شد.');
                        try { await sendScreenshotLink(page, chatId); } catch(e) {}
                        await updateKeyboard(chatId);
                      }
                      page = browserManager.page;
                    }
                    if (upRes.data?.next_offset_id) offset = upRes.data.next_offset_id;
                  }
                } catch(e) {
                  err('خطای حلقه اصلی:', e.message);
                  await sleep(5000);
                }
                await sleep(4000);
              }

              log('⏰ خاموشی خودکار.');
              clearInterval(cleanupInterval);
              await browserManager.browser.close();
              browserManager.xrayProc.kill();
              if (tempRepo) await deleteTempRepo(tempRepo.fullName);
              if (OWNER) await sendMessage(OWNER, '⏹️ ربات خاموش شد.');
            } catch(fatalError) {
              err('🚨 خطای مرگبار:', fatalError.message);
              console.error(fatalError);
              process.exit(1);
            }
          })();
          ENDSCRIPT


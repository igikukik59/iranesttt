name: 📤 Upload sample Python file to Saved Messages

on:
  workflow_dispatch:

jobs:
  upload:
    runs-on: ubuntu-latest
    env:
      SESSION_B64: ${{ secrets.RUBIKA_SESSION }}
      SESSION_NAME: rubika_session
      SESSION_FILE: rubika_session.rp

    steps:
      - name: ⬇️ Checkout repository (optional)
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install rubpy
        run: pip install rubpy==7.3.5

      - name: 🔐 Decode session file
        run: echo "$SESSION_B64" | base64 -d > $SESSION_FILE

      - name: 📋 Check session file
        run: ls -la $SESSION_FILE

      - name: 🚀 Generate dummy file & upload to Saved Messages
        run: |
          python << 'PYEOF'
          import asyncio
          import os
          from pathlib import Path
          from rubpy import Client

          async def main():
              # 1. ساخت یک فایل پایتون ساده
              content = '''
          print("🌍 Hello from GitHub Actions!")
          print("This file was uploaded automatically.")
          '''
              file_path = Path("sample_script.py")
              file_path.write_text(content.strip(), encoding="utf-8")
              print(f"📄 Created file: {file_path} ({file_path.stat().st_size} bytes)")

              # 2. آپلود فایل به "Saved Messages"
              try:
                  async with Client(name=os.environ["SESSION_NAME"]) as app:
                      # send_document به "me" یعنی خودت
                      await app.send_document(
                          "me",
                          str(file_path),
                          caption="📎 Sample Python file from GitHub Actions"
                      )
                      print("✅ File uploaded to Saved Messages successfully!")
              except Exception as e:
                  print(f"❌ Upload failed: {e}")
                  exit(1)

          asyncio.run(main())
          PYEOF

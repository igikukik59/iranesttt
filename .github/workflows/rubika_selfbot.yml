          async function scrollAreaByPixel(page, areaIndex, px, direction) {
            const sign = direction === 'up' ? -1 : 1;
            await page.evaluate(({idx, px, sign}) => {
              const el = document.querySelector(`[data-rubika-scroll-id="${idx}"]`);
              if (el) {
                el.scrollBy(0, sign * px);
              } else if (idx === 1) {
                window.scrollBy(0, sign * px);
              }
            }, {idx: areaIndex, px, sign});

name: "کوتاه‌کردن لینک با zaya.io (تست)"

on:
  workflow_dispatch:

jobs:
  shorten:
    name: "کوتاه کردن لینک"
    runs-on: ubuntu-latest

    steps:
      - name: "Checkout"
        uses: actions/checkout@v4

      - name: "ارسال به zaya.io و دریافت لینک کوتاه"
        id: shorten
        run: |
          echo "========================================="
          echo "شروع فرآیند کوتاه‌سازی لینک"
          echo "========================================="

          LONG_URL="https://github.com/igikukik59/Proxy-Google-Checker/raw/refs/heads/main/downloaded_videos/video_1777368946169_page.mp4"
          TOKEN="5YThpa8rq11Kf6memGJXfiTnTzYqLH1Xcs2csk1rPdulzMwDVOwTn5V8e6MJ"

          echo "لینک اصلی: ${LONG_URL}"

          BODY="{\"url\":\"${LONG_URL}\"}"
          echo "بدنه درخواست: ${BODY}"

          RESPONSE=$(curl -s -w "\n%{http_code}" --location --request POST "https://zaya.io/api/v1/links" \
            --header "Content-Type: application/json" \
            --header "Authorization: Bearer ${TOKEN}" \
            --data-raw "${BODY}")

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          echo "-----------------------------------------"
          echo "کد وضعیت HTTP: ${HTTP_CODE}"
          echo "پاسخ دریافتی:"
          echo "${BODY}"
          echo "-----------------------------------------"

          # 🔧 اصلاح: پذیرش 200 و 201
          if [ "${HTTP_CODE}" != "200" ] && [ "${HTTP_CODE}" != "201" ]; then
            echo "⛔ خطا: zaya.io کد ${HTTP_CODE} برگرداند."
            echo "پاسخ کامل: ${BODY}"
            exit 1
          fi

          SHORT_URL=$(echo "${BODY}" | jq -r '.short_url // .data.short_url // .data.alias // "NOT_FOUND"')
          if [ "${SHORT_URL}" == "null" ] || [ "${SHORT_URL}" == "NOT_FOUND" ]; then
            echo "⛔ نتوانستیم لینک کوتاه را از پاسخ استخراج کنیم."
            exit 1
          fi

          if [[ "${SHORT_URL}" != http* ]]; then
            DOMAIN="https://zaya.io"
            SHORT_URL="${DOMAIN}/${SHORT_URL}"
          fi

          echo "========================================="
          echo "✅ لینک کوتاه شده: ${SHORT_URL}"
          echo "========================================="

          echo "short_url=${SHORT_URL}" >> $GITHUB_OUTPUT

      - name: "نمایش نهایی"
        run: |
          echo ""
          echo "🎉 لینک کوتاه نهایی:"
          echo "${{ steps.shorten.outputs.short_url }}"
          echo ""

name: "Upload to ParsPack with Full Log + Push to Repo"

on:
  workflow_dispatch:  # فقط دستی اجرا بشه
  # اگه می‌خوای با هر push هم اجرا بشه کامنت زیر رو بردار:
  # push:
  #   branches: [ main ]

jobs:
  upload-and-log:
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true   # برای push دوباره نیازه

      - name: 🖨️ Print environment info
        run: |
          echo "=== SYSTEM INFO ==="
          uname -a
          echo "=== AWS CLI VERSION ==="
          aws --version || echo "AWS CLI not found (will install)"
          echo "=== WORKFLOW START TIME ==="
          date

      # -----------------------------------------------------------------
      # 1. دانلود فایل نمونه
      # -----------------------------------------------------------------
      - name: 📥 Download random test file
        id: download
        run: |
          echo "::group::Downloading sample file"
          # یک عکس تصادفی از Lorem Picsum
          curl -v -L -o sample.jpg "https://picsum.photos/600/400.jpg" 2>&1 | tee curl.log
          echo "::endgroup::"
          echo "Download exit code: $?" >> debug.log
          echo "File details:" >> debug.log
          ls -la sample.jpg >> debug.log 2>&1
          file sample.jpg >> debug.log 2>&1
          echo "Curl log:" >> debug.log
          cat curl.log >> debug.log

      # -----------------------------------------------------------------
      # 2. پیکربندی AWS CLI
      # -----------------------------------------------------------------
      - name: 🔧 Configure AWS CLI for ParsPack
        env:
          ACCESS_KEY: NNRPnLgYkTdXW116
          SECRET_KEY: Duepx7acOGXppSLnMRLxqb1SCG0KbZrX
          BUCKET: 123q123w123e
          ENDPOINT: https://c622836.parspack.net
        run: |
          echo "::group::AWS CLI Configuration"
          aws configure set aws_access_key_id "$ACCESS_KEY" --profile parspack
          aws configure set aws_secret_access_key "$SECRET_KEY" --profile parspack
          aws configure set region us-east-1 --profile parspack
          echo "Profile 'parspack' configured."
          echo "::endgroup::"
          echo "AWS CLI profiles:" >> debug.log
          aws configure list --profile parspack >> debug.log 2>&1

      # -----------------------------------------------------------------
      # 3. ساخت یک نام یکتا برای فایل در باکت
      # -----------------------------------------------------------------
      - name: 🏷️ Generate unique object key
        id: vars
        run: |
          UNIQUE_KEY="test-$(date +%s)-${RANDOM}.jpg"
          echo "object_key=$UNIQUE_KEY" >> $GITHUB_OUTPUT
          echo "Generated key: $UNIQUE_KEY" >> debug.log

      # -----------------------------------------------------------------
      # 4. آپلود فایل به باکت
      # -----------------------------------------------------------------
      - name: ☁️ Upload file to bucket (with full debug)
        id: upload
        env:
          BUCKET: 123q123w123e
          ENDPOINT: https://c622836.parspack.net
          OBJECT_KEY: ${{ steps.vars.outputs.object_key }}
        run: |
          echo "::group::Upload details"
          echo "Uploading sample.jpg..."
          echo "Bucket: $BUCKET"
          echo "Object: $OBJECT_KEY"
          echo "Endpoint: $ENDPOINT"
          echo "Command: aws s3 cp sample.jpg s3://$BUCKET/$OBJECT_KEY --profile parspack --endpoint-url $ENDPOINT --no-verify-ssl"
          set -o pipefail
          aws s3 cp sample.jpg "s3://$BUCKET/$OBJECT_KEY" \
            --profile parspack \
            --endpoint-url "$ENDPOINT" \
            --no-verify-ssl \
            --debug 2>&1 | tee upload-debug.log
          UPLOAD_EXIT=$?
          echo "::endgroup::"
          echo "Upload exit code: $UPLOAD_EXIT" >> debug.log
          if [ $UPLOAD_EXIT -ne 0 ]; then
            echo "ERROR: Upload failed with exit code $UPLOAD_EXIT" | tee -a debug.log
            exit $UPLOAD_EXIT
          fi
          echo "Upload succeeded." | tee -a debug.log

      # -----------------------------------------------------------------
      # 5. ساختن لینک موقت (Pre-signed URL)
      # -----------------------------------------------------------------
      - name: 🔗 Generate pre-signed URL
        id: presign
        env:
          BUCKET: 123q123w123e
          ENDPOINT: https://c622836.parspack.net
          OBJECT_KEY: ${{ steps.vars.outputs.object_key }}
        run: |
          echo "::group::Pre-signed URL generation"
          PRESIGNED=$(aws s3 presign "s3://$BUCKET/$OBJECT_KEY" \
            --profile parspack \
            --endpoint-url "$ENDPOINT" \
            --expires-in 3600 2>&1)
          echo "Pre-signed URL exit code: $?" >> debug.log
          echo "Pre-signed URL: $PRESIGNED" >> debug.log
          echo "::endgroup::"
          # ذخیره توی output برای مرحله بعد
          echo "presigned_url=$PRESIGNED" >> $GITHUB_OUTPUT
          echo "Direct URL: https://$ENDPOINT/$BUCKET/$OBJECT_KEY" >> debug.log

      # -----------------------------------------------------------------
      # 6. جمع‌آوری تمام لاگ‌ها در یک فایل نهایی
      # -----------------------------------------------------------------
      - name: 📝 Combine all logs into upload-log.txt
        run: |
          echo "==================== UPLOAD LOG ====================" > upload-log.txt
          echo "" >> upload-log.txt
          echo "Workflow run ID: $GITHUB_RUN_ID" >> upload-log.txt
          echo "Run attempt: $GITHUB_RUN_ATTEMPT" >> upload-log.txt
          echo "Date (UTC): $(date -u)" >> upload-log.txt
          echo "" >> upload-log.txt
          echo "--- DEBUG LOG ---" >> upload-log.txt
          cat debug.log >> upload-log.txt 2>/dev/null || echo "No debug.log" >> upload-log.txt
          echo "" >> upload-log.txt
          echo "--- UPLOAD DEBUG (from AWS CLI) ---" >> upload-log.txt
          cat upload-debug.log >> upload-log.txt 2>/dev/null || echo "No upload debug log" >> upload-log.txt
          echo "" >> upload-log.txt
          echo "--- FINAL URLs ---" >> upload-log.txt
          echo "Direct URL: https://c622836.parspack.net/${{ steps.vars.outputs.object_key }}" >> upload-log.txt
          echo "Pre-signed URL: ${{ steps.presign.outputs.presigned_url }}" >> upload-log.txt
          echo "" >> upload-log.txt
          echo "==================== END LOG ====================" >> upload-log.txt

      # -----------------------------------------------------------------
      # 7. نمایش لاگ توی کنسول (برای راحتی)
      # -----------------------------------------------------------------
      - name: 📣 Print log to console
        run: cat upload-log.txt

      # -----------------------------------------------------------------
      # 8. کامیت و پوش فایل لاگ به ریپازیتوری
      # -----------------------------------------------------------------
      - name: ⬆️ Commit and push log file to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add upload-log.txt
          git commit -m "📋 Add upload log from workflow run $GITHUB_RUN_ID" || echo "No changes to commit"
          git push origin HEAD:${{ github.ref_name }} || echo "Push failed (maybe not allowed?)"

name: Get teleMirror Release (API)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  get-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get latest release asset URL
        id: get-url
        run: |
          # دریافت اطلاعات آخرین ریلیز
          release=$(curl -sL \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/ircfspace/teleMirror/releases/latest)

          # پیدا کردن فایل مورد نظر
          asset_url=$(echo "$release" | jq -r \
            '.assets[] | select(.name == "tele-mirror-win-arm64.zip") | .url')

          echo "asset_url=$asset_url" >> $GITHUB_OUTPUT

      - name: Download asset
        run: |
          curl -L \
            -H "Accept: application/octet-stream" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -o tele-mirror-win-arm64.zip \
            "${{ steps.get-url.outputs.asset_url }}"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tele-mirror-win-arm64.zip
          git commit -m "Add teleMirror (latest release)" || echo "Nothing to commit"
          git push

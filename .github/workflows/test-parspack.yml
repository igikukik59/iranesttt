name: 🧪 تست مخزن موقت (امن با PAT_TOKEN)

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    permissions:
      contents: write           # برای push به ریپوی اصلی
    steps:
      - name: 📥 checkout ریپوی اصلی
        uses: actions/checkout@v4

      - name: 🔬 تست مخزن موقت با PAT_TOKEN
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}   # 👈 توکن از Secret خونده می‌شه
        run: |
          # ============================================================
          log() { echo "[$(date '+%H:%M:%S')] ℹ️ $1"; }
          success() { echo "[$(date '+%H:%M:%S')] ✅ $1"; }
          error() { echo "[$(date '+%H:%M:%S')] ❌ $1"; }

          log "=============================================="
          log "شروع تست با توکن از Secret"
          log "=============================================="

          if [ -z "${PAT_TOKEN}" ]; then
            error "PAT_TOKEN در Secret تنظیم نشده."
            exit 1
          fi

          # ۱. بررسی صحت توکن
          log "مرحله ۱: بررسی صحت توکن..."
          USER_CODE=$(curl -s -o /tmp/user.json -w "%{http_code}" \
            -H "Authorization: token ${PAT_TOKEN}" \
            https://api.github.com/user)
          log "HTTP status: ${USER_CODE}"
          if [ "${USER_CODE}" != "200" ]; then
            error "توکن نامعتبر. پاسخ:"
            cat /tmp/user.json
            exit 1
          fi
          success "توکن معتبر است"
          USERNAME=$(grep -o '"login": "[^"]*"' /tmp/user.json | head -1 | cut -d'"' -f4)
          log "نام کاربری: ${USERNAME}"

          # ۲. ساخت مخزن موقت
          log "مرحله ۲: ساخت مخزن موقت..."
          TIMESTAMP=$(date +%s)
          REPO_NAME="temp-test-${TIMESTAMP}"
          log "نام مخزن: ${REPO_NAME}"

          CREATE_CODE=$(curl -s -o /tmp/create.json -w "%{http_code}" \
            -X POST \
            -H "Authorization: token ${PAT_TOKEN}" \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Content-Type: application/json" \
            -d "{\"name\":\"${REPO_NAME}\",\"auto_init\":false,\"private\":false,\"description\":\"مخزن تست موقت\"}" \
            https://api.github.com/user/repos)

          log "HTTP status ساخت: ${CREATE_CODE}"
          if [ "${CREATE_CODE}" != "201" ]; then
            error "ساخت مخزن شکست:"
            cat /tmp/create.json
            exit 1
          fi
          success "مخزن ساخته شد"
          FULL_NAME=$(grep -o '"full_name": "[^"]*"' /tmp/create.json | head -1 | cut -d'"' -f4)
          CLONE_URL=$(grep -o '"clone_url": "[^"]*"' /tmp/create.json | head -1 | cut -d'"' -f4)
          OWNER=$(echo "${FULL_NAME}" | cut -d'/' -f1)
          log "full_name: ${FULL_NAME}"

          # ۳. ساخت فایل تصادفی ۱۰MB
          log "مرحله ۳: ساخت فایل ۱۰MB..."
          dd if=/dev/urandom of=/tmp/random_10mb.bin bs=1M count=10 status=none
          success "فایل تصادفی ساخته شد"

          # ۴. push به مخزن موقت
          log "مرحله ۴: push..."
          TMP_DIR="/tmp/temp-repo"
          rm -rf "${TMP_DIR}" && mkdir -p "${TMP_DIR}"
          cd "${TMP_DIR}"
          git init && git checkout -b main
          git config user.name "testbot"
          git config user.email "testbot@users.noreply.github.com"
          cp /tmp/random_10mb.bin .
          git add random_10mb.bin
          git commit -m "test file"
          PUSH_URL=$(echo "${CLONE_URL}" | sed "s|https://|https://${PAT_TOKEN}@|")
          git remote add origin "${PUSH_URL}"
          git push -u origin main
          success "push انجام شد"

          # ۵. ساخت لینک raw
          RAW_LINK="https://raw.githubusercontent.com/${OWNER}/${REPO_NAME}/main/random_10mb.bin"
          log "لینک raw: ${RAW_LINK}"

          # ۶. تست دانلود از روی رانر
          log "مرحله ۶: تست دانلود..."
          HTTP_RESP=$(curl -s -o /tmp/downloaded.bin -w "%{http_code}" --max-time 30 "${RAW_LINK}")
          DL_SIZE=$(stat -c%s /tmp/downloaded.bin 2>/dev/null || echo 0)
          log "http_code=${HTTP_RESP}, size=${DL_SIZE}"
          if [ "${HTTP_RESP}" = "200" ] && [ "${DL_SIZE}" -gt 0 ]; then
            success "دانلود موفق از سرور گیت‌هاب"
          else
            log "دانلود از رانر ممکن است محدود باشد (در ایران تست کنید)"
          fi

          # ۷. ذخیره نتایج در ریپوی اصلی
          log "مرحله ۷: ذخیره نتایج..."
          cd /home/runner/work/iranesttt/iranesttt
          cat > test_link.txt << EOF
          ✅ تست با PAT_TOKEN (امن) موفق
          زمان: $(date)
          مخزن: ${FULL_NAME}
          لینک مستقیم:
          ${RAW_LINK}

          برای تست در ایران، لینک بالا را در مرورگر باز کنید.
          EOF

          git add test_link.txt
          git commit -m "گزارش تست با PAT_TOKEN"
          git push
          success "نتایج در test_link.txt ذخیره شد"
          echo ""
          echo "=============================="
          echo "   ${RAW_LINK}"
          echo "=============================="

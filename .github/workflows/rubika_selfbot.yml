name: 📦 Upload 10MB file & measure speed

on:
  workflow_dispatch:

jobs:
  upload-large:
    runs-on: ubuntu-latest
    env:
      SESSION_B64: ${{ secrets.RUBIKA_SESSION }}
      SESSION_NAME: rubika_session
      SESSION_FILE: rubika_session.rp

    steps:
      - name: ⬇️ Checkout (optional)
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install rubpy
        run: pip install rubpy==7.3.5

      - name: 🔐 Decode session
        run: echo "$SESSION_B64" | base64 -d > $SESSION_FILE

      - name: 📋 Check session file
        run: ls -la $SESSION_FILE

      - name: 🚀 Generate large file & upload with timing
        run: |
          python << 'PYEOF'
          import asyncio
          import os
          import time
          from pathlib import Path
          from rubpy import Client

          async def main():
              # 1. ساخت فایل 10 مگابایتی (داده تصادفی)
              file_path = Path("large_10mb.bin")
              target_size = 10 * 1024 * 1024  # 10 MB
              print(f"📄 Creating random file of size {target_size} bytes...")
              with open(file_path, "wb") as f:
                  f.write(os.urandom(target_size))
              size_mb = file_path.stat().st_size / (1024 * 1024)
              print(f"📁 File created: {file_path} ({size_mb:.2f} MB)")

              # 2. اتصال و آپلود با زمان‌سنجی
              try:
                  async with Client(name=os.environ["SESSION_NAME"]) as app:
                      print("⏳ Uploading to Saved Messages...")
                      start = time.time()
                      await app.send_document(
                          "me",
                          str(file_path),
                          caption="📦 Large 10MB file — speed test"
                      )
                      end = time.time()
                      duration = end - start
                      speed = (target_size / (1024 * 1024)) / duration  # MB/s
                      print(f"✅ Upload completed!")
                      print(f"⏱️ Duration: {duration:.2f} seconds")
                      print(f"🚀 Average speed: {speed:.2f} MB/s")
              except Exception as e:
                  print(f"❌ Upload failed: {e}")
                  exit(1)

          asyncio.run(main())
          PYEOF

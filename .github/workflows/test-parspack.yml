name: 🧪 تست مخزن موقت (با توکن مستقیم)

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    permissions:
      contents: write
    env:
      # توکن موقتی که خودت دادی - مستقیم توی کد Node استفاده می‌شه
      PAT_TOKEN: "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"
    steps:
      - name: 📥 دریافت ریپوی اصلی
        uses: actions/checkout@v4

      - name: 🧪 تست مخزن موقت + لینک raw
        run: |
          cat > test_temp_repo.cjs << 'ENDSCRIPT'
          const { execSync } = require('child_process');
          const fs = require('fs');
          const path = require('path');

          // تنظیمات git (برای push به ریپوی اصلی)
          execSync('git config --global user.name "github-actions[bot]"', {stdio:'pipe'});
          execSync('git config --global user.email "github-actions[bot]@users.noreply.github.com"', {stdio:'pipe'});

          const PAT = process.env.PAT_TOKEN;
          if (!PAT) {
            console.error('❌ PAT_TOKEN setting not found in env.');
            process.exit(1);
          }
          console.log('🔑 استفاده از توکن موقت:', PAT.substring(0, 4) + '...' + PAT.slice(-4));

          function log(msg) { console.log(`[${new Date().toISOString().substring(0,19)}] ${msg}`); }

          // ===================== Api helper =====================
          async function ghApi(url, options = {}) {
            const res = await fetch(url, {
              ...options,
              headers: {
                Authorization: `token ${PAT}`,
                'Content-Type': 'application/json',
                ...(options.headers || {})
              }
            });
            const data = await res.json().catch(() => ({}));
            if (!res.ok) {
              throw new Error(`GitHub API (${res.status}): ${JSON.stringify(data)}`);
            }
            return data;
          }

          // ===================== ساخت مخزن =====================
          async function createRepo(name) {
            log(`📦 ساختن مخزن ${name} ...`);
            const data = await ghApi('https://api.github.com/user/repos', {
              method: 'POST',
              body: JSON.stringify({
                name,
                auto_init: false,
                private: false,         // public => raw link works
                description: 'مخزن موقت تست (ظرف یک ساعت حذف شود)'
              })
            });
            log(`✅ مخزن ساخته شد: ${data.html_url}`);
            return { cloneUrl: data.clone_url, fullName: data.full_name };
          }

          (async () => {
            // ۱. ساختن مخزن موقت
            const repoName = `temp-test-${Date.now()}`;
            const { cloneUrl, fullName } = await createRepo(repoName);
            // fullName e.g., "igikukik59/temp-test-..."

            // ۲. ساخت فایل تصادفی ۱۰MB
            const tmpDir = '/tmp/temp-repo-test';
            if (fs.existsSync(tmpDir)) fs.rmSync(tmpDir, { recursive: true });
            fs.mkdirSync(tmpDir, { recursive: true });
            const filePath = path.join(tmpDir, 'random_10mb.bin');
            {
              const sizeMB = 10;
              const chunk = Buffer.allocUnsafe(1024 * 1024);
              const fd = fs.openSync(filePath, 'w');
              for (let written = 0; written < sizeMB * 1024 * 1024; written += chunk.length) {
                for (let i = 0; i < chunk.length; i++) chunk[i] = Math.floor(Math.random() * 256);
                fs.writeSync(fd, chunk, 0, Math.min(chunk.length, sizeMB * 1024 * 1024 - written));
              }
              fs.closeSync(fd);
            }
            log('📁 فایل ۱۰MB تصادفی ساخته شد.');

            // ۳. Push به مخزن موقت
            process.chdir(tmpDir);
            execSync('git init', {stdio:'pipe'});
            execSync('git checkout -b main', {stdio:'pipe'});
            execSync('git add random_10mb.bin', {stdio:'pipe'});
            execSync('git commit -m "فایل تست موقت"', {stdio:'pipe'});

            // remote با توکن
            const pushUrl = cloneUrl.replace('https://', `https://${PAT}@`);
            execSync(`git remote add origin ${pushUrl}`, {stdio:'pipe'});
            execSync('git push -u origin main', {stdio:'pipe'});
            log('📤 فایل با موفقیت push شد.');

            // ۴. ساخت لینک raw
            const [owner] = fullName.split('/');
            const rawLink = `https://raw.githubusercontent.com/${owner}/${repoName}/main/random_10mb.bin`;
            log(`🔗 لینک مستقیم:\n${rawLink}`);

            // ۵. ذخیره در ریپوی اصلی
            const mainRepoDir = process.env.GITHUB_WORKSPACE; // جایی که checkout شده
            process.chdir(mainRepoDir);
            const resultText = `✅ تست موفق\nمخزن: ${fullName}\nزمان: ${new Date().toISOString()}\nلینک مستقیم:\n${rawLink}\n\n⚠️ مخزن موقت پس از تست دستی حذف شود.`;
            fs.writeFileSync('test_link.txt', resultText);
            execSync('git add test_link.txt', {stdio:'pipe'});
            execSync('git commit -m "📎 ذخیره لینک raw تست (توکن مستقیم)"', {stdio:'pipe'});
            execSync('git push', {stdio:'pipe'});
            log('📤 فایل test_link.txt در ریپوی اصلی به‌روزرسانی شد.');
            log('🎉 تمام! لینک بالاست. حالا در مرورگر ایران تستش کن.');
          })().catch(err => {
            console.error('❌ شکست:', err.message);
            // باز هم فایل را با خطا می‌نویسیم
            const mainRepoDir = process.env.GITHUB_WORKSPACE;
            if (mainRepoDir) {
              process.chdir(mainRepoDir);
              fs.writeFileSync('test_link.txt', `❌ خطا:\n${err.message}`);
              try {
                execSync('git add test_link.txt && git commit -m "ثبت خطای تست" && git push', {stdio:'pipe'});
              } catch(e) {}
            }
            process.exit(1);
          });
          ENDSCRIPT

          node test_temp_repo.cjs
